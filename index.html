// Local date as YYYY-MM-DD (avoids UTC timezone shift from toISOString)
function localDateStr(d) {
  const dt = d || new Date();
  return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");
}
const todayIsoLocal = () => localDateStr(new Date());

// Normalize: old data used d.day (string), new data uses d.days (array)
const getDays = d => Array.isArray(d.days) ? d.days : d.day ? [d.day] : [];

// Returns YYYY-MM-DD for Monday of the current week
function naturalMonday() {
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const diff = (day === 0 ? -6 : 1 - day);
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff);
  return localDateStr(mon);
}

// Stored as JSON { start, anchor?, weekId? } or legacy plain YYYY-MM-DD (close-week).
// anchor: week counts start at `start` for the calendar week identified by weekId (= naturalMonday when set).
// close: same as before — "close week" sets start to today; applies when start >= current natural Monday.
function parseWeekOverride(raw) {
  if (!raw) return null;
  try {
    const j = JSON.parse(raw);
    if (j && typeof j.start === "string" && /^\d{4}-\d{2}-\d{2}$/.test(j.start)) {
      return {
        start: j.start,
        anchor: !!j.anchor,
        weekId: typeof j.weekId === "string" && /^\d{4}-\d{2}-\d{2}$/.test(j.weekId) ? j.weekId : null,
      };
    }
  } catch {}
  if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return { start: raw, anchor: false, weekId: null };
  return null;
}

function weekOverrideKey(uid) {
  return uid ? `gft-week-override-${uid}` : "gft-week-override";
}

// Returns the effective week start — Monday by default, but an athlete can
// "close out" their week early or set an anchor from session history.
function weekStart(uid) {
  const nm = naturalMonday();
  const key = weekOverrideKey(uid);
  let raw;
  try {
    raw = localStorage.getItem(key);
  } catch {
    return nm;
  }
  const o = parseWeekOverride(raw);
  if (!o) return nm;
  if (o.anchor) {
    if (!o.weekId || o.weekId !== nm) {
      try {
        localStorage.removeItem(key);
      } catch {}
      return nm;
    }
    return o.start;
  }
  if (o.start >= nm) return o.start;
  try {
    localStorage.removeItem(key);
  } catch {}
  return nm;
}

// Set today as the manual week start for a specific athlete (close week)
function closeWeekNow(uid) {
  const key = weekOverrideKey(uid);
  const payload = JSON.stringify({ start: todayIsoLocal(), anchor: false });
  try {
    localStorage.setItem(key, payload);
  } catch {}
}

// Align weekly counts to a past session date (Manage → session history). Scoped to the current calendar week.
function setWeekAnchorFromSession(uid, sessionDateStr) {
  if (!sessionDateStr || !/^\d{4}-\d{2}-\d{2}$/.test(sessionDateStr)) return;
  const key = weekOverrideKey(uid);
  const payload = JSON.stringify({
    start: sessionDateStr,
    anchor: true,
    weekId: naturalMonday(),
  });
  try {
    localStorage.setItem(key, payload);
  } catch {}
}

// Clear the manual override for a specific athlete
function clearWeekOverride(uid) {
  try {
    localStorage.removeItem(weekOverrideKey(uid));
  } catch {}
}

// Whether localStorage still has a week override that affects this athlete (for UNDO / UI).
function hasManualWeekSetting(uid) {
  let raw;
  try {
    raw = localStorage.getItem(weekOverrideKey(uid));
  } catch {
    return false;
  }
  const o = parseWeekOverride(raw);
  if (!o) return false;
  const nm = naturalMonday();
  if (o.anchor) return o.weekId === nm;
  return o.start >= nm;
}

// How many sessions of a named day were logged this week
// Session keys: "YYYY-MM-DD" for old sessions, "YYYY-MM-DD_timestamp" for new ones
// dateOf() extracts just the date portion from any key format
function dateOf(key) { return key ? key.split("_")[0] : ""; }

function sessionsThisWeek(dayLabel, history, uid) {
  const ws = weekStart(uid);
  return Object.entries(history||{})
    .filter(([key, sess]) => dateOf(key) >= ws && sess?.day === dayLabel)
    .length;
}

// Is a frequency-mode day "available" this week (hasn't hit target yet)
function freqAvailable(day, history, uid) {
  if(day.scheduleType !== "frequency") return false;
  return sessionsThisWeek(day.label, history, uid) < (day.timesPerWeek||3);
}

// ── RPE Stimulus Multiplier ──────────────────────────────────────────────────
// Based on proximity-to-failure research (Schoenfeld, Krieger)
function rpeMultiplier(rpe) {
  if(!rpe || rpe<=0) return 0.5; // unknown RPE — assume moderate
  if(rpe<=4) return 0.2;
  if(rpe<=5) return 0.3;
  if(rpe<=6) return 0.5;
  if(rpe<=7) return 0.7;
  if(rpe<=8) return 0.85;
  if(rpe<=9) return 0.95;
  return 1.0;
}

// Build backward-compatible EXERCISE_MUSCLE_MAP from EXERCISE_DB
const EXERCISE_MUSCLE_MAP = {};
Object.entries(EXERCISE_DB).forEach(([k,v])=>{ EXERCISE_MUSCLE_MAP[k]=v.muscles; });

// ── Workout Generator ────────────────────────────────────────────────────────

// Get unique exercises (deduplicated by display name) filtered by equipment
function getAvailableExercises(equipment) {
  const seen = new Set();
  const result = [];
  Object.entries(EXERCISE_DB).forEach(([key, ex]) => {
    if(seen.has(ex.name)) return;
    // Check if user has at least one piece of required equipment
    const hasEquip = ex.equip.some(e => equipment.includes(e));
    if(!hasEquip) return;
    seen.add(ex.name);
    result.push({key, ...ex});
  });
  return result;
}

// Score an exercise for a target muscle — higher = better fit
function exerciseScore(ex, targetMuscle) {
  return ex.muscles[targetMuscle] || 0;
}

// Group muscles into body regions for smart workout generation
const MUSCLE_REGIONS = {
  "Chest":["chest"],
  "Back":["lats","upper_back","traps"],
  "Shoulders":["front_delts","side_delts","rear_delts"],
  "Arms":["biceps","triceps","forearms"],
  "Quads":["quads"],
  "Hamstrings & Glutes":["hamstrings","glutes"],
  "Core":["abs","obliques","lower_back"],
  "Calves":["calves"],
};

// Common workout templates
const WORKOUT_TEMPLATES = {
  "chest_tris":   {label:"Chest & Triceps", targets:["chest","triceps","front_delts"], sets:{compound:4,isolation:3}, count:5},
  "back_bis":     {label:"Back & Biceps", targets:["lats","upper_back","biceps","rear_delts"], sets:{compound:4,isolation:3}, count:5},

  "arms":         {label:"Arms", targets:["biceps","triceps","forearms"], sets:{compound:3,isolation:3}, count:5},
  "core":         {label:"Core", targets:["abs","obliques","lower_back"], sets:{compound:3,isolation:3}, count:4},
};

function generateWorkout(templateKey, equipment, history) {
  const template = WORKOUT_TEMPLATES[templateKey];
  if(!template) return null;

  const available = getAvailableExercises(equipment);
  if(available.length === 0) return null;

  const selected = [];
  const usedNames = new Set();

  // For each target muscle, find the best available exercise
  template.targets.forEach(muscle => {
    // Score all available exercises for this muscle
    const scored = available
      .filter(ex => !usedNames.has(ex.name))
      .map(ex => ({...ex, score: exerciseScore(ex, muscle)}))
      .filter(ex => ex.score > 0)
      .sort((a,b) => b.score - a.score);

    if(scored.length > 0) {
      // Pick top exercise (could randomize among top 3 for variety)
      const pick = scored[Math.floor(Math.random() * Math.min(3, scored.length))];
      const isCompound = Object.keys(pick.muscles).length >= 3;
      selected.push({
        name: pick.name,
        sets: isCompound ? template.sets.compound : template.sets.isolation,
        reps: isCompound ? "8" : "12",
        rest: isCompound ? 120 : 60,
        muscles: pick.muscles
      });
      usedNames.add(pick.name);
    }
  });

  return {
    label: template.label,
    exercises: selected.slice(0, template.count)
  };
}

// Generate workout targeting neglected muscles
function generateNeglectedWorkout(equipment, history, weekMuscleData) {
  const available = getAvailableExercises(equipment);
  if(available.length === 0) return null;

  // Find muscles below MEV, sorted by most neglected
  const neglected = MUSCLE_GROUPS
    .map(m => ({id:m, sets: weekMuscleData[m]?.sets||0, mev: VOLUME_THRESHOLDS[m].mev}))
    .filter(m => m.sets < m.mev)
    .sort((a,b) => (a.sets/a.mev) - (b.sets/b.mev)); // most underworked first

  if(neglected.length === 0) return null;

  const targets = neglected.slice(0, 6).map(m => m.id);
  const selected = [];
  const usedNames = new Set();

  targets.forEach(muscle => {
    const scored = available
      .filter(ex => !usedNames.has(ex.name))
      .map(ex => ({...ex, score: exerciseScore(ex, muscle)}))
      .filter(ex => ex.score > 0)
      .sort((a,b) => b.score - a.score);

    if(scored.length > 0) {
      const pick = scored[Math.floor(Math.random() * Math.min(3, scored.length))];
      const isCompound = Object.keys(pick.muscles).length >= 3;
      selected.push({
        name: pick.name,
        sets: isCompound ? 4 : 3,
        reps: isCompound ? "8" : "12",
        rest: isCompound ? 120 : 60,
        muscles: pick.muscles
      });
      usedNames.add(pick.name);
    }
  });

  const muscleNames = neglected.slice(0,3).map(m=>MUSCLE_LABELS[m.id]).join(", ");
  return {
    label: `Recovery: ${muscleNames}`,
    exercises: selected.slice(0, 6)
  };
}

// ── Fuzzy Exercise Name Matching ─────────────────────────────────────────────
function normalizeExName(name) {
  return (name||"").toLowerCase().replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim();
}

// DB-only lookup with fuzzy matching — does NOT check user overrides
function getDbMuscleSplit(exerciseName) {
  const norm = normalizeExName(exerciseName);
  if(EXERCISE_MUSCLE_MAP[norm]) return EXERCISE_MUSCLE_MAP[norm];
  for(const [key, map] of Object.entries(EXERCISE_MUSCLE_MAP)){
    if(norm.includes(key) || key.includes(norm)) return map;
  }
  const normWords = norm.split(" ").filter(w=>w.length>2);
  let bestKey=null, bestScore=0;
  for(const key of Object.keys(EXERCISE_MUSCLE_MAP)){
    const keyWords = key.split(" ").filter(w=>w.length>2);
    const overlap = normWords.filter(w=>keyWords.some(kw=>kw.includes(w)||w.includes(kw))).length;
    const score = overlap / Math.max(normWords.length, keyWords.length);
    if(score > bestScore && score >= 0.4){ bestScore=score; bestKey=key; }
  }
  return bestKey ? EXERCISE_MUSCLE_MAP[bestKey] : null;
}

// Read/write user-defined muscle overrides from localStorage
function getCustomMuscleSplit(exerciseName) {
  try {
    const map = JSON.parse(localStorage.getItem("gft-ex-muscles")||"{}");
    return map[normalizeExName(exerciseName)] || null;
  } catch { return null; }
}
function setCustomMuscleSplit(exerciseName, muscles) {
  try {
    const map = JSON.parse(localStorage.getItem("gft-ex-muscles")||"{}");
    const key = normalizeExName(exerciseName);
    if(muscles && Object.keys(muscles).length > 0) map[key] = muscles;
    else delete map[key];
    localStorage.setItem("gft-ex-muscles", JSON.stringify(map));
  } catch {}
}

// Public: custom override first, then fuzzy DB lookup
function getMuscleSplit(exerciseName) {
  return getCustomMuscleSplit(exerciseName) || getDbMuscleSplit(exerciseName);
}

// ── Calculate Weekly Muscle Stimulus ─────────────────────────────────────────
function calcWeeklyMuscleData(history, weekStartDate) {
  const result = {};
  MUSCLE_GROUPS.forEach(m => { result[m] = { stimulus:0, sets:0, intensity:0, sessions:0 }; });

  const sessionDates = {}; // track per-muscle session dates for recovery analysis

  Object.entries(history).forEach(([key, sess]) => {
    if(!sess) return;
    const sessDate = sess.date || dateOf(key);
    if(sessDate < weekStartDate) return;

    const named = sess.namedLog || {};
    Object.entries(named).forEach(([exName, sets]) => {
      const split = getMuscleSplit(exName);
      if(!split) return;

      const validSets = (sets||[]).filter(s=>s&&!s.skipped);
      validSets.forEach(s => {
        const w = parseFloat(s.weight)||0;
        const r = parseFloat(s.reps)||0;
        const rpe = s.rpe||0;
        const rpeMult = rpeMultiplier(rpe);
        const setVolume = w * r * rpeMult;

        Object.entries(split).forEach(([muscle, pct]) => {
          result[muscle].stimulus += setVolume * pct;

          // Tiered set counting:
          // Primary (≥35% activation) = 1 full set — the muscle is a main mover
          // Secondary (15-34%) = 0.5 set — meaningful involvement but not the focus
          // Tertiary (<15%) = fractional — minimal contribution
          let setCredit;
          if(pct >= 0.35) setCredit = 1.0;
          else if(pct >= 0.15) setCredit = 0.5;
          else setCredit = pct;

          result[muscle].sets += setCredit;
          result[muscle].intensity = Math.max(result[muscle].intensity, rpe);
          if(!sessionDates[muscle]) sessionDates[muscle] = new Set();
          sessionDates[muscle].add(sessDate);
        });
      });
    });
  });

  // Calculate recovery risk — consecutive days at high intensity
  MUSCLE_GROUPS.forEach(m => {
    const dates = [...(sessionDates[m]||[])].sort();
    let consecutiveHighDays = 0;
    for(let i=1; i<dates.length; i++){
      const diff = (new Date(dates[i]+"T12:00:00") - new Date(dates[i-1]+"T12:00:00")) / 86400000;
      if(diff <= 1 && result[m].intensity >= 7) consecutiveHighDays++;
    }
    result[m].sessions = (sessionDates[m]||new Set()).size;
    result[m].recoveryRisk = consecutiveHighDays;
  });

  return result;
}

// ── Get muscle status for coloring ───────────────────────────────────────────
function getMuscleStatus(muscleData, muscleId) {
  const d = muscleData[muscleId];
  if(!d) return "none";
  const thresh = VOLUME_THRESHOLDS[muscleId];
  const sets = d.sets;
  if(sets <= 0) return "none";
  if(sets > thresh.mrv || d.recoveryRisk >= 2) return "overtrained";
  if(sets > thresh.mav) return "warning";
  if(sets >= thresh.mev) return "productive";
  if(sets >= thresh.mv) return "maintenance";
  return "light";
}

function getMuscleColor(status, athleteColor) {
  switch(status){
    case "none": return "#1a1a1a";
    case "light": return "#2a3a2a";
    case "maintenance": return "#3a5a3a";
    case "productive": return athleteColor || "#A8FF3E";
    case "warning": return "#FF8C42";
    case "overtrained": return "#FF4444";
    default: return "#1a1a1a";
  }
}

function getMuscleOpacity(status) {
  switch(status){
    case "none": return 0.3;
    case "light": return 0.5;
    case "maintenance": return 0.6;
    case "productive": return 0.85;
    case "warning": return 0.9;
    case "overtrained": return 1.0;
    default: return 0.3;
  }
}

// ── Calorie calculation ─────────────────────────────────────────────────────
// BMR: Katch-McArdle when body fat known (most accurate), else Mifflin-St Jeor
function calcBMR(bio) {
  const w=parseFloat(bio?.weightKg);
  if(!w) return null;
  // Katch-McArdle — uses lean body mass, no sex/height/age needed
  const bf=parseFloat(bio?.bodyFatPct);
  if(bf>0&&bf<100){
    const lbm=w*(1-bf/100);
    return 370 + 21.6*lbm;
  }
  // Mifflin-St Jeor fallback
  const h=parseFloat(bio?.heightCm), a=parseFloat(bio?.age);
  if(!h||!a) return null;
  if(bio.sex==="female") return 10*w+6.25*h-5*a-161;
  return 10*w+6.25*h-5*a+5;
}

function metFromRpe(avgRpe) {
  if (!avgRpe || avgRpe <= 0) return 5.0;
  if (avgRpe <= 4) return 3.5;
  if (avgRpe <= 6) return 5.0;
  if (avgRpe <= 8) return 6.0;
  return 8.0;
}

function calcCalories(bio, durationMin, avgRpe) {
  if (!bio?.weightKg || !durationMin) return null;
  const w = parseFloat(bio.weightKg);
  if (!w) return null;
  const met = metFromRpe(avgRpe);
  // Use lean mass for calorie calc when BF% is set (more accurate)
  const bf = parseFloat(bio?.bodyFatPct);
  const effW = (bf>0&&bf<100) ? w*(1-bf/100)*1.1+w*0.15 : w; // weighted blend
  return Math.round(met * effW * (durationMin / 60));
}

function escCsv(v) {
  if(v==null) return "";
  const s = String(v);
  if(s.includes(",")||s.includes('"')||s.includes("\n")) return '"'+s.replace(/"/g,'""')+'"';
  return s;
}

function buildBackupCsv(users, programs, history, goals) {
  const rows = [
    ["key","json_value"],
    ["gft-users", JSON.stringify(users)],
    ["gft-programs", JSON.stringify(programs)],
    ["gft-history", JSON.stringify(history)],
    ["gft-goals", JSON.stringify(goals)],
  ];
  return rows.map(r=>r.map(escCsv).join(",")).join("\n");
}

      const date=sess.date||dateOf(key);
      Object.entries(sess.namedLog||{}).forEach(([exName,sets])=>{
        (sets||[]).filter(Boolean).forEach((s,i)=>{
          const wLbs = s.weight==="BW"?"BW":s.weight?parseFloat((parseFloat(s.weight)*2.20462).toFixed(1)):"";
          const vol = (wLbs&&wLbs!=="BW"&&s.reps)?parseFloat((parseFloat(wLbs)*parseFloat(s.reps)).toFixed(1)):"";
          rows.push([date, u.name, exName, i+1, wLbs, s.reps||"", s.rpe>0?s.rpe:"", vol]);
        });
      });
    });
  });
  return rows.map(r=>r.map(escCsv).join(",")).join("\n");
}

function tryDownloadCsv(csv, filename) {
  // Works in normal browsers; silently fails in sandboxed iframes
  try {
    const blob = new Blob([csv], {type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename; a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
  } catch(e) { /* blocked in sandbox — user copies from modal */ }
}

async function importBackupCsv(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const lines = e.target.result.trim().split("\n");
        const data = {};
        // Skip header row, parse key,json_value rows
        lines.slice(1).forEach(line => {
          // Handle quoted JSON values
          const commaIdx = line.indexOf(",");
          if(commaIdx===-1) return;
          const key = line.slice(0, commaIdx).replace(/^"|"$/g,"");
          let val = line.slice(commaIdx+1).trim();
          if(val.startsWith('"') && val.endsWith('"')) {
            val = val.slice(1,-1).replace(/""/g,'"');
          }
          try { data[key] = JSON.parse(val); } catch {}
        });
        resolve(data);
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsText(file);
  });
}

// ─── Storage with Google Sheets Sync ─────────────────────────────────────────
const SYNC_URL = "https://script.google.com/macros/s/AKfycbwiPH3oo9QSS2nYaWCgWKX55Csr9Hy9Fir68DOYF_F7fp3ObBV5VZ3Z2tEbxKFLee9e/exec";

// Write to localStorage immediately, then push to Google Sheets in background
async function sSet(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
  // Background sync — don't await, don't block the UI
  syncToSheet(k, JSON.stringify(v));
}

// Read from localStorage (fast, offline-first)
async function sGet(k) {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; }
}

// Push a single key to Google Sheets
function syncToSheet(key, value) {
  try {
    fetch(SYNC_URL, {
      method: "POST",
      redirect: "follow",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ key, value })
    }).catch(() => {}); // silently fail if offline
  } catch {}
}

// Pull all data from Google Sheets (used on startup for cross-device sync)
async function syncFromSheet() {
  try {
    const resp = await fetch(SYNC_URL + "?t=" + Date.now(), { redirect: "follow" });
    if (!resp.ok) return null;
    const data = await resp.json();
    return data;
  } catch { return null; }
}

// Merge two history objects — unions all sessions across both sources.
// For the same session key: prefers completed over partial, then more sets logged.
function mergeHistories(local, cloud) {
  const merged = {};
  const allUids = new Set([...Object.keys(local||{}), ...Object.keys(cloud||{})]);
  for(const uid of allUids) {
    const lSess = (local||{})[uid] || {};
    const cSess = (cloud||{})[uid] || {};
    const allKeys = new Set([...Object.keys(lSess), ...Object.keys(cSess)]);
    merged[uid] = {};
    for(const key of allKeys) {
      const l = lSess[key];
      const c = cSess[key];
      if(!l) { merged[uid][key] = c; continue; }
      if(!c) { merged[uid][key] = l; continue; }
      // Both have this session — prefer completed over partial
      if(!l.partial && c.partial) { merged[uid][key] = l; continue; }
      if(l.partial && !c.partial) { merged[uid][key] = c; continue; }
      // Both same completion status — prefer whichever has more sets logged
      const lSets = Object.values(l.namedLog||{}).reduce((a,s)=>a+(Array.isArray(s)?s.length:0),0);
      const cSets = Object.values(c.namedLog||{}).reduce((a,s)=>a+(Array.isArray(s)?s.length:0),0);
      merged[uid][key] = cSets > lSets ? c : l;
    }
  }
  return merged;
}

// Sync all 4 data keys to Google Sheets at once
function syncAllToSheet() {
  const keys = ["gft-users", "gft-programs", "gft-history", "gft-goals"];
  keys.forEach(k => {
    try {
      const v = localStorage.getItem(k);
      if (v) syncToSheet(k, v);
    } catch {}
  });
}

// All weights stored internally as kg (numbers).
// "BW" = bodyweight (no conversion).

// Parse a stored kg value and render in chosen unit with suffix
function wtDisplay(kgVal, useKg) {
  if(!kgVal && kgVal !== 0) return "BW";
  if(kgVal === "BW") return "BW";
  const n = parseFloat(kgVal);
  if(isNaN(n)) return String(kgVal);
  if(useKg) return `${n % 1 === 0 ? n : n.toFixed(1)} kg`;
  return `${(n * 2.20462).toFixed(1)} lbs`;
}

// Convert entered value to kg for storage
function toStoredKg(val, enteredInKg) {
  if(!val || val === "BW" || val === "") return val;
  const n = parseFloat(val);
  if(isNaN(n)) return val;
  return enteredInKg ? n : +(n / 2.20462).toFixed(2);
}

// Convert stored kg to display value (string) in chosen unit for inputs
function toDisplayVal(kgVal, useKg) {
  if(!kgVal && kgVal !== 0) return "";
  if(kgVal === "BW") return "";
  const n = parseFloat(kgVal);
  if(isNaN(n)) return "";
  if(useKg) return String(n % 1 === 0 ? n : parseFloat(n.toFixed(1)));
  return String(parseFloat((n * 2.20462).toFixed(1)));
}

// ─── QWERTY Keyboard (slide-up, touch-first) ─────────────────────────────────
function Keyboard({ value, onConfirm, onClose, color, label, multiline=false }) {
  const [v, setV] = useState(value||"");
  const [caps, setCaps] = useState(false);
  const [shifted, setShifted] = useState(false);
  const [mode, setMode] = useState("alpha"); // "alpha" | "sym" | "pad"

  const rows_alpha = [
    ["q","w","e","r","t","y","u","i","o","p"],
    ["a","s","d","f","g","h","j","k","l"],
    ["⇧","z","x","c","v","b","n","m","⌫"],
  ];
  const rows_sym = [
    ["1","2","3","4","5","6","7","8","9","0"],
    ["-","/",":",";","(",")","$","&","@",'"'],
    ["#+=",".",",","?","!","'","⌫"],
  ];
  const pad_rows = [["7","8","9"],["4","5","6"],["1","2","3"],["C","0","⌫"]];

  function press(k) {
    if (k === "⌫") { setV(s => s.slice(0,-1)); return; }
    if (k === "C") { setV(""); return; }
    if (k === "⇧") { setShifted(s => { const n=!s; setCaps(n); return n; }); return; }
    if (k === "123") { setMode("sym"); setCaps(false); setShifted(false); return; }
    if (k === "ABC") { setMode("alpha"); setCaps(false); setShifted(false); return; }
    if (k === "#+=") { setMode(m => m==="sym"?"alpha":"sym"); return; }
    if (k === "SPACE") { setV(s => s + " "); return; }
    if (k === "RETURN") { if(multiline) setV(s => s + "\n"); return; }
    const char = (caps || shifted) ? k.toUpperCase() : k;
    setV(s => s + char);
    if (shifted && !caps) { setCaps(false); setShifted(false); }
  }

  const padKeyStyle = (k) => ({
    height: 72, borderRadius: 14,
    fontSize: k==="⌫"?26:k==="C"?20:30,
    fontFamily: k==="C"?"'Barlow Condensed',sans-serif":"'Bebas Neue',sans-serif",
    fontWeight: 700,
    background: k==="C"?"#2a0a0a":k==="⌫"?"#1a1a1a":"#1e1e1e",
    border: `2px solid ${k==="C"?"#FF444433":k==="⌫"?"#2a2a2a":"#2a2a2a"}`,
    color: k==="C"?"#FF6060":k==="⌫"?"#888":"#F0F0F0",
    cursor:"pointer", userSelect:"none",
    display:"flex", alignItems:"center", justifyContent:"center",
  });

  const keyStyle = (k) => {
    const isSpecial = ["⇧","⌫","#+=","123","ABC","SPACE","RETURN","PAD"].includes(k);
    const isActive = (k==="⇧" && caps) || (k==="PAD" && mode==="pad");
    return {
      minWidth: k==="SPACE"?"100%":k==="RETURN"||k==="PAD"?62:k==="⌫"||k==="⇧"?62:42,
      height: 56, borderRadius: 12,
      background: isActive ? color : isSpecial ? "#2a2a2a" : "#1e1e1e",
      border: `1px solid ${isActive ? color : "#333"}`,
      color: isActive ? "#000" : isSpecial ? "#aaa" : "#f0f0f0",
      fontSize: k==="⌫"?24:k==="⇧"||k==="PAD"?22:22,
      fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 700,
      cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
      flexShrink: 0, userSelect:"none", transition:"background 0.08s",
    };
  };

  const rows = mode==="sym" ? rows_sym : rows_alpha;

  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,zIndex:9500,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#111",borderTop:`3px solid ${color}`,borderRadius:"24px 24px 0 0",
        padding:"14px 12px 24px", maxHeight:"94vh", display:"flex", flexDirection:"column"}}>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,padding:"0 4px",flexShrink:0}}>
          <div style={{color:"#444",fontSize:11,letterSpacing:3,fontFamily:"'Barlow Condensed',sans-serif"}}>{label?.toUpperCase()}</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#555",fontSize:20,cursor:"pointer",padding:"2px 8px"}}>✕</button>
        </div>

        {/* Preview */}
        <div style={{
          background:"#0d0d0d", border:`2px solid ${color}55`, borderRadius:10,
          padding:"8px 12px", marginBottom:10, minHeight:38, maxHeight:72, overflowY:"auto",
          fontFamily:"'Barlow',sans-serif", fontSize:16, color:"#F0F0F0",
          lineHeight:1.5, wordBreak:"break-all", whiteSpace:"pre-wrap", flexShrink:0,
        }}>
          {v||<span style={{color:"#333"}}>Start typing...</span>}
          <span style={{display:"inline-block",width:2,height:"1em",background:color,
            marginLeft:2,verticalAlign:"text-bottom",animation:"blink 1s step-end infinite"}}/>
        </div>

        {/* Keys — fill remaining space */}
        <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
        {mode==="pad" ? (
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:6}}>
              {pad_rows.map((row,ri)=>(
                <div key={ri} style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                  {row.map(k=>(
                    <button key={k} onPointerDown={e=>{e.preventDefault();press(k);}} style={{...padKeyStyle(k),height:64}}>{k}</button>
                  ))}
                </div>
              ))}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,width:72}}>
              <button onPointerDown={e=>{e.preventDefault();setMode("alpha");}}
                style={{height:64,borderRadius:12,background:"#2a2a2a",border:"1px solid #383838",
                  color:"#ccc",fontSize:16,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
                  cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>ABC</button>
              <button onPointerDown={e=>{e.preventDefault();setMode("sym");}}
                style={{height:64,borderRadius:12,background:"#2a2a2a",border:"1px solid #383838",
                  color:"#ccc",fontSize:15,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
                  cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>!#&</button>
              <button onPointerDown={e=>{e.preventDefault();onConfirm(v);}}
                style={{flex:1,borderRadius:12,background:color,border:"none",color:"#000",
                  fontSize:18,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,
                  cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>DONE</button>
            </div>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {rows.map((row,ri)=>(
              <div key={ri} style={{display:"flex",gap:5,justifyContent:"center"}}>
                {row.map(k=>(
                  <button key={k} onPointerDown={e=>{e.preventDefault();press(k);}}
                    style={{...keyStyle(k),height:52,minWidth:k==="⌫"||k==="⇧"?56:0,flex:k==="⌫"||k==="⇧"?"0 0 56px":"1 1 0"}}>
                    {k==="⇧"?"⇧":k==="⌫"?"⌫":k==="#+="?"#+=":caps||shifted?k.toUpperCase():k}
                  </button>
                ))}
              </div>
            ))}
            {/* Bottom row — always visible */}
            <div style={{display:"flex",gap:5,width:"100%",marginTop:2}}>
              <button onPointerDown={e=>{e.preventDefault();press(mode==="sym"?"ABC":"123");}}
                style={{...keyStyle("123"),height:52,width:56,minWidth:0,flex:"0 0 56px",fontSize:15}}>{mode==="sym"?"ABC":"123"}</button>
              <button onPointerDown={e=>{e.preventDefault();setMode("pad");}}
                style={{...keyStyle("PAD"),height:52,width:50,minWidth:0,flex:"0 0 50px",fontSize:20,
                  background:mode==="pad"?color:"#252525",color:mode==="pad"?"#000":"#aaa"}}>🔢</button>
              <button onPointerDown={e=>{e.preventDefault();press("SPACE");}}
                style={{...keyStyle("SPACE"),height:52,flex:1,minWidth:0}}>SPACE</button>
              {multiline&&<button onPointerDown={e=>{e.preventDefault();press("RETURN");}}
                style={{...keyStyle("RETURN"),height:52,width:50,minWidth:0,flex:"0 0 50px",fontSize:24}}>↵</button>}
              <button onPointerDown={e=>{e.preventDefault();onConfirm(v);}}
                style={{...keyStyle("DONE"),height:52,width:76,minWidth:0,flex:"0 0 76px",background:color,border:"none",color:"#000",fontSize:16,letterSpacing:1}}>DONE</button>
            </div>
          </div>
        )}
        </div>
      </div>
      <style>{`@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}`}</style>
    </div>,
    document.body
  );
}

// ─── NumPad (slide-up on-screen keyboard for numbers) ─────────────────────────
function NumPad({ value, onConfirm, onClose, color, label, unit="" }) {
  const [v, setV] = useState(String(value||""));
  const display = v === "" ? "0" : v;
  function press(k){
    if(k==="⌫"){ setV(s=>s.slice(0,-1)); return; }
    if(k==="C"){ setV(""); return; }
    if(k==="." && v.includes(".")) return;
    if(k==="." && v==="") { setV("0."); return; }
    if(v==="0" && k!==".") { setV(k); return; }
    if(v.length>=6) return;
    setV(s=>s+k);
  }
  const keys=[["7","8","9"],["4","5","6"],["1","2","3"],["C","0","⌫"]];
  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,zIndex:9500,display:"flex",flexDirection:"column",
      justifyContent:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#111",borderTop:`3px solid ${color}`,borderRadius:"24px 24px 0 0",
        padding:"20px 20px 32px"}}>
        {/* Display */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div style={{color:"#444",fontSize:12,letterSpacing:3,fontFamily:"'Barlow Condensed',sans-serif"}}>{label?.toUpperCase()}</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#555",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:72,color,lineHeight:1,letterSpacing:2}}>
            {display}<span style={{fontSize:28,color:"#444",marginLeft:6}}>{unit}</span>
          </div>
        </div>
        {/* Keys */}
        <div style={{display:"grid",gridTemplateRows:"repeat(4,1fr)",gap:10,marginBottom:16}}>
          {keys.map((row,ri)=>(
            <div key={ri} style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {row.map(k=>(
                <button key={k} onClick={()=>press(k)} style={{
                  height:68,borderRadius:16,fontSize:k==="⌫"?26:28,
                  fontFamily:k==="⌫"||k==="C"?"'Barlow Condensed',sans-serif":"'Bebas Neue',sans-serif",
                  fontWeight:700,letterSpacing:k==="C"||k==="⌫"?2:1,
                  background:k==="C"?"#2a0a0a":k==="⌫"?"#1a1a1a":"#1e1e1e",
                  border:`2px solid ${k==="C"?"#FF444433":k==="⌫"?"#2a2a2a":"#2a2a2a"}`,
                  color:k==="C"?"#FF6060":k==="⌫"?"#888":"#F0F0F0",
                  cursor:"pointer",transition:"transform 0.08s,background 0.08s",
                  active:{transform:"scale(0.93)"}
                }}>{k}</button>
              ))}
            </div>
          ))}
        </div>
        <button onClick={()=>onConfirm(v===""?"0":v)} style={{
          width:"100%",height:72,background:color,color:"#000",border:"none",
          borderRadius:18,fontFamily:"'Bebas Neue',sans-serif",fontSize:28,letterSpacing:3,
          cursor:"pointer",boxShadow:`0 4px 24px ${color}44`}}>CONFIRM</button>
      </div>
    </div>,
    document.body
  );
}

// ─── WeightSpinner — touch-optimised weight picker ────────────────────────────
function WeightSpinner({ value, onChange, useKg, color, prevValue }) {
  const [showPad, setShowPad] = useState(false);
  const timerRef = useRef(null);

  const num = parseFloat(value) || 0;
  const step = useKg ? 0.1 : 0.5;
  const chips = useKg ? [-1,-0.5,0.5,1] : [-2,-1,1,2];

  function adjust(delta){
    const next = Math.max(0, Math.round((num + delta) * 100) / 100);
    onChange(String(next % 1 === 0 ? next : parseFloat(next.toFixed(2))));
  }

  function startHold(delta){
    timerRef.current = setInterval(()=>adjust(delta), 120);
  }
  function stopHold(){ clearInterval(timerRef.current); }

  const display = num === 0 ? (prevValue ? toDisplayVal(prevValue, useKg) : "0") : value;
  const isDefault = num === 0;

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        {/* Big minus */}
        <button
          onPointerDown={()=>{adjust(-step);startHold(-step);}}
          onPointerUp={stopHold} onPointerLeave={stopHold}
          style={{width:60,height:60,borderRadius:14,background:"#1a1a1a",
            border:`2px solid ${color}44`,color:color,fontSize:30,cursor:"pointer",
            flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",userSelect:"none"}}>−</button>

        {/* Tappable display / keyboard-typeable input */}
        <div onClick={()=>setShowPad(true)} tabIndex={0}
          onKeyDown={e=>{
            if(e.key==="Enter"||e.key==="Escape"){e.target.blur();return;}
            if(e.key==="Backspace"){onChange(value.slice(0,-1));e.preventDefault();return;}
            if(/^[0-9.]$/.test(e.key)){
              const v=(value||"")+e.key;
              if(/^\d*\.?\d*$/.test(v)) onChange(v);
              e.preventDefault();
            }
          }}
          style={{
          flex:1,height:60,borderRadius:14,background:"#111",
          border:`2px solid ${color}55`,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",gap:6,position:"relative",
          outline:"none"}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,
            color:isDefault?"#383838":color,letterSpacing:1,pointerEvents:"none"}}>
            {display}
          </span>
          <span style={{color:"#333",fontSize:13,pointerEvents:"none",position:"absolute",right:12}}>
            {useKg?"kg":"lbs"}
          </span>
        </div>

        {/* Big plus */}
        <button
          onPointerDown={()=>{adjust(step);startHold(step);}}
          onPointerUp={stopHold} onPointerLeave={stopHold}
          style={{width:60,height:60,borderRadius:14,background:"#1a1a1a",
            border:`2px solid ${color}44`,color:color,fontSize:30,cursor:"pointer",
            flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",userSelect:"none"}}>+</button>
      </div>

      {/* Quick chips */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {prevValue&&num===0&&(
          <button onClick={()=>onChange(String(toDisplayVal(prevValue,useKg)))}
            style={{background:`${color}22`,border:`1px solid ${color}55`,borderRadius:8,
              color:color,padding:"6px 12px",fontSize:12,cursor:"pointer",
              fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1}}>
            ↩ {wtDisplay(prevValue,useKg)}
          </button>
        )}
        {chips.map(c=>(
          <button key={c} onClick={()=>adjust(c)}
            style={{background:c>0?"#0f1f0f":"#1f0f0f",
              border:`1px solid ${c>0?"#2a3a2a":"#3a2a2a"}`,borderRadius:8,
              color:c>0?"#7ddd7d":"#dd7d7d",padding:"6px 12px",fontSize:12,cursor:"pointer",
              fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1}}>
            {c>0?"+":""}{c}
          </button>
        ))}
        {num>0&&(
          <button onClick={()=>onChange("")}
            style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:8,
              color:"#555",padding:"6px 10px",fontSize:12,cursor:"pointer"}}>✕</button>
        )}
      </div>

      {showPad&&<NumPad value={num||""} label={`Weight (${useKg?"kg":"lbs"})`} unit={useKg?"kg":"lbs"}
        color={color} onConfirm={v=>{onChange(v);setShowPad(false);}} onClose={()=>setShowPad(false)}/>}
    </div>
  );
}

// ─── BigStepper — large touch stepper for program fields ──────────────────────
function BigStepper({ value, onChange, min=0, max=999, step=1, color, label, unit="" }) {
  const [showPad, setShowPad] = useState(false);
  const timerRef = useRef(null);
  function adj(d){ const n=Math.min(max,Math.max(min,value+(d*step))); onChange(n); }
  function startHold(d){ timerRef.current=setInterval(()=>adj(d),150); }
  function stopHold(){ clearInterval(timerRef.current); }
  return (
    <div>
      {label&&<div style={{color:"#444",fontSize:10,letterSpacing:3,marginBottom:8,
        fontFamily:"'Barlow Condensed',sans-serif"}}>{label}</div>}
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button onPointerDown={()=>{adj(-1);startHold(-1);}} onPointerUp={stopHold} onPointerLeave={stopHold}
          style={{width:52,height:52,borderRadius:12,background:"#1a1a1a",
            border:`2px solid ${color}33`,color:color,fontSize:26,cursor:"pointer",
            flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",userSelect:"none"}}>−</button>
        <div onClick={()=>setShowPad(true)} tabIndex={0}
          onKeyDown={e=>{
            if(e.key==="Enter"||e.key==="Escape"){e.target.blur();return;}
            if(e.key==="Backspace"){const s=String(value).slice(0,-1);onChange(parseFloat(s)||min);e.preventDefault();return;}
            if(/^[0-9.]$/.test(e.key)){
              const s=String(value)+e.key;
              const n=parseFloat(s);
              if(!isNaN(n)) onChange(Math.min(max,Math.max(min,n)));
              e.preventDefault();
            }
          }}
          style={{
          flex:1,height:52,borderRadius:12,background:"#111",
          border:`2px solid ${color}44`,cursor:"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",gap:4,position:"relative",
          outline:"none"}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color,letterSpacing:1,pointerEvents:"none"}}>{value}</span>
          {unit&&<span style={{color:"#444",fontSize:12,pointerEvents:"none",position:"absolute",right:10}}>{unit}</span>}
        </div>
        <button onPointerDown={()=>{adj(1);startHold(1);}} onPointerUp={stopHold} onPointerLeave={stopHold}
          style={{width:52,height:52,borderRadius:12,background:"#1a1a1a",
            border:`2px solid ${color}33`,color:color,fontSize:26,cursor:"pointer",
            flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",userSelect:"none"}}>+</button>
      </div>
      {showPad&&<NumPad value={value} label={label} unit={unit}
        color={color} onConfirm={v=>{onChange(parseFloat(v)||min);setShowPad(false);}} onClose={()=>setShowPad(false)}/>}
    </div>
  );
}

          </div>

        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,letterSpacing:2,color:"#161616"}}>
          OFFLINE-FIRST · GOOGLE SHEETS SYNC · PWA
        </div>
      </div>

      {/* Per-athlete close week confirmation modal */}
      {closeWeekUid&&(()=>{
        const u=users.find(x=>x.id===closeWeekUid);
        if(!u) return null;
        return (
          <div style={{position:"fixed",inset:0,zIndex:9000,background:"rgba(0,0,0,0.88)",
            backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
            <div style={{background:"#111",border:"1px solid #2a2a2a",borderRadius:20,
              padding:"32px 28px",maxWidth:340,width:"100%",textAlign:"center",display:"flex",flexDirection:"column",gap:20}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12}}>
                <span style={{fontSize:36}}>{u.emoji}</span>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:u.color,letterSpacing:3,lineHeight:1}}>
                  CLOSE {u.name.toUpperCase()}'S WEEK?
                </div>
              </div>
              <div style={{color:"#555",fontSize:13,lineHeight:1.6}}>
                Today becomes {u.name}'s new week start. Their session counts and muscle volume reset — history is kept.
              </div>
              <div style={{background:"#0d0d0d",border:"1px solid #1e1e1e",borderRadius:12,padding:"12px 16px"}}>
                <div style={{color:"#333",fontSize:10,letterSpacing:2,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:4}}>NEW WEEK STARTS</div>
                <div style={{color:u.color,fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2}}>
                  {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
                </div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setCloseWeekUid(null)} style={{
                  flex:1,height:48,borderRadius:12,background:"none",border:"1px solid #2a2a2a",
                  color:"#555",fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,cursor:"pointer"}}>
                  CANCEL
                </button>
                <button onClick={()=>handleCloseWeek(u.id)} style={{
                  flex:1,height:48,borderRadius:12,background:u.color,border:"none",
                  color:"#080808",fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,cursor:"pointer"}}>
                  CLOSE WEEK
                </button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// SESSION SCREEN — side-by-side panels (fixed fullscreen)
// ══════════════════════════════════════════════════════════════════════════════
function SessionScreen({ activeIds: initialIds, users, programs, history, goals, onSaveWorkout, onSaveAsProgram, onBack, onUpdateProgram, onUpdateUser, onUpdateGoals, onUpdateHistory }) {
  const [currentIds, setCurrentIds] = useState(initialIds);
  const [leftIds, setLeftIds] = useState([]); // athletes who left but session continues
  const [showAddPicker, setShowAddPicker] = useState(false);
  const [managingUser, setManagingUser] = useState(null); // {uid, view:"menu"|"edit"|"program"|"progress"|"sessions"} or null
  const active = users.filter(u => currentIds.includes(u.id));
  const left = users.filter(u => leftIds.includes(u.id));
  const available = users.filter(u => !currentIds.includes(u.id) && !leftIds.includes(u.id));
  const cols = active.length + left.length;

  function addAthlete(uid) {
    setCurrentIds(ids => [...ids, uid]);
    setLeftIds(ids => ids.filter(id => id !== uid));
    setShowAddPicker(false);
  }

  function removeAthlete(uid) {
    const nextActive = currentIds.filter(id => id !== uid);
    if (nextActive.length === 0 && leftIds.length === 0) {
      onBack();
    } else {
      setCurrentIds(nextActive);
      setLeftIds(ids => [...ids, uid]);
    }
  }

  function rejoinAthlete(uid) {
    setLeftIds(ids => ids.filter(id => id !== uid));
    setCurrentIds(ids => [...ids, uid]);
  }

  function fullyRemoveAthlete(uid) {
    const nextLeft = leftIds.filter(id => id !== uid);
    if (currentIds.length === 0 && nextLeft.length === 0) {
      onBack();
    } else {
      setLeftIds(nextLeft);
    }
  }

  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 100,
      display: "flex", flexDirection: "column",
      background: "#080808", overflow: "hidden"
    }}>
      {/* Top bar */}
      <div style={{
        height: 48, flexShrink: 0,
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "0 20px", background: "#0c0c0c", borderBottom: "2px solid #161616"
      }}>
        <Btn label="✕ END ALL" size="sm" bg="transparent" color="#555" border="#1e1e1e" onClick={onBack} />

        {/* Centre: active + left athlete name badges */}
        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
          {active.map(u => (
            <div key={u.id} style={{ display:"flex", alignItems:"center", gap:5,
              background:`${u.color}18`, border:`1px solid ${u.color}44`,
              borderRadius:8, padding:"4px 10px" }}>
              <span style={{ fontSize:14 }}>{u.emoji}</span>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:12,
                letterSpacing:1, color:u.color }}>{u.name.toUpperCase()}</div>
            </div>
          ))}
          {left.map(u => (
            <div key={u.id} style={{ display:"flex", alignItems:"center", gap:5,
              background:"#1a1a1a", border:"1px solid #2a2a2a",
              borderRadius:8, padding:"4px 10px", opacity:0.4 }}>
              <span style={{ fontSize:14 }}>{u.emoji}</span>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700, fontSize:12,
                letterSpacing:1, color:"#555" }}>{u.name.toUpperCase()}</div>
            </div>
          ))}
        </div>

        {/* Add athlete button - shown when < 3 active and more users exist */}
        {available.length > 0 && cols < 3 ? (
          <button onClick={() => setShowAddPicker(true)} style={{
            background: "rgba(255,255,255,0.05)", border: "2px dashed #383838",
            borderRadius: 12, color: "#666", padding: "8px 18px", cursor: "pointer",
            fontFamily: "'Barlow Condensed',sans-serif", fontWeight: 700,
            fontSize: 13, letterSpacing: 2, display: "flex", alignItems: "center", gap: 8,
            transition: "all 0.15s",
          }}
          onPointerEnter={e => { e.currentTarget.style.borderColor="#888"; e.currentTarget.style.color="#F0F0F0"; }}
          onPointerLeave={e => { e.currentTarget.style.borderColor="#383838"; e.currentTarget.style.color="#666"; }}>
            <span style={{ fontSize:18, lineHeight:1 }}>＋</span> JOIN SESSION
          </button>
        ) : (
          <div style={{ width: 148 }} />
        )}
      </div>

      {/* Columns — always side-by-side, equal width */}
      <div style={{
        display: "flex",
        flex: 1, minHeight: 0, overflow: "hidden"
      }}>
        {active.map((u, i) => (
          <div key={u.id} style={{
            borderRight: (i < active.length - 1 || left.length > 0) ? "2px solid #1a1a1a" : "none",
            display: "flex", flexDirection: "column",
            minHeight: 0, overflow: "clip", position: "relative",
            flex: `1 1 ${100/cols}%`, minWidth: 0,
          }}>
            <WorkoutPanel
              user={u} program={programs[u.id]}
              history={history[u.id] || {}}
              onSaveWorkout={(dk, sess) => onSaveWorkout(u.id, dk, sess)}
              onSaveAsProgram={(dayData) => onSaveAsProgram(u.id, dayData)}
              onLeave={() => removeAthlete(u.id)}
            />
          </div>
        ))}

        {/* Idle panels for athletes who left */}
        {left.map((u, i) => {
          const prog = programs[u.id];
          const totalSessions = Object.keys(history[u.id]||{}).length;
          return (
            <div key={u.id} style={{
              borderRight: i < left.length - 1 ? "2px solid #1a1a1a" : "none",
              display: "flex", flexDirection: "column",
              minHeight: 0, background: "#0a0a0a", position: "relative",
              flex: `1 1 ${100/cols}%`, minWidth: 0,
            }}>
              {/* Header */}
              <div style={{background:"#0d0d0d",borderBottom:`3px solid ${u.color}33`,padding:"14px 18px",
                display:"flex",alignItems:"center",gap:14,flexShrink:0}}>
                <Avatar user={u} size={44} />
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:u.color,letterSpacing:2,lineHeight:1,opacity:0.6}}>{u.name}</div>
                  <div style={{color:"#333",fontSize:11,letterSpacing:2}}>SESSION ENDED</div>
                </div>
              </div>

              {/* Action buttons */}
              <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",
                gap:14,padding:24,paddingBottom:40,
                overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
                <div style={{fontSize:42,opacity:0.4}}>{u.emoji}</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"#333",
                  letterSpacing:3,textAlign:"center",lineHeight:1.2}}>
                  DONE FOR<br/>TODAY?
                </div>
                <div style={{color:"#2a2a2a",fontSize:11,textAlign:"center",maxWidth:200,lineHeight:1.5}}>
                  {prog?.name} · {totalSessions} sessions logged
                </div>

                <div style={{display:"flex",flexDirection:"column",gap:10,width:"100%",maxWidth:260,marginTop:8}}>
                  <Btn full label="↩ REJOIN SESSION" bg={u.color} color="#000"
                    onClick={()=>rejoinAthlete(u.id)}/>
                  <Btn full label="👤 EDIT PROFILE" icon="" bg="rgba(255,255,255,0.06)" color="#ddd" border="#2a2a2a"
                    onClick={()=>setManagingUser({uid:u.id,view:"edit"})}/>
                  <Btn full label="📋 BUILD / EDIT PROGRAM" icon="" bg="rgba(255,255,255,0.06)" color="#ddd" border="#2a2a2a"
                    onClick={()=>setManagingUser({uid:u.id,view:"program"})}/>
                  <Btn full label="📈 VIEW PROGRESS" icon="" bg="rgba(255,255,255,0.06)" color="#ddd" border="#2a2a2a"
                    onClick={()=>setManagingUser({uid:u.id,view:"progress"})}/>
                  <Btn full label="📝 EDIT SESSIONS" icon="" bg="rgba(255,255,255,0.06)" color="#ddd" border="#2a2a2a"
                    onClick={()=>setManagingUser({uid:u.id,view:"sessions"})}/>
                  <Btn full label="✕ LEAVE" bg="transparent" color="#555" border="#1e1e1e"
                    onClick={()=>fullyRemoveAthlete(u.id)}/>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Manage overlay for left athletes — full manage access */}
      {managingUser && (()=>{
        const mu = users.find(u=>u.id===managingUser.uid);
        if(!mu) return null;
        const mv = managingUser.view;

        const header = (title) => (
          <div style={{background:"#0d0d0d",borderBottom:`3px solid ${mu.color}`,padding:"16px 24px",
            display:"flex",alignItems:"center",gap:16,flexShrink:0}}>
            <Btn label="← BACK" size="sm" bg="transparent" color="#555" border="#1e1e1e"
              onClick={()=>setManagingUser(null)}/>
            <Avatar user={mu} size={40}/>
            <div style={{flex:1}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:mu.color,letterSpacing:2,lineHeight:1}}>{mu.name}</div>
              <div style={{color:"#444",fontSize:11,letterSpacing:2}}>{title}</div>
            </div>
          </div>
        );

        return (
          <div style={{position:"absolute",inset:0,zIndex:300,background:"#080808",
            display:"flex",flexDirection:"column",overflow:"hidden"}}>

            {/* Edit Profile — UserEditModal renders its own Modal overlay */}
            {mv==="edit" && (
              <UserEditModal user={mu}
                onSave={u=>{onUpdateUser(u);setManagingUser(null);}}
                onClose={()=>setManagingUser(null)}/>
            )}

            {/* Program Editor */}
            {mv==="program" && (
              <div style={{flex:1,overflow:"auto"}}>
                <ProgramEditor user={mu} program={programs[mu.id]}
                  onSave={p=>{onUpdateProgram(mu.id,p);setManagingUser(null);}}
                  onBack={()=>setManagingUser(null)}/>
              </div>
            )}

            {/* Progress */}
            {mv==="progress" && (
              <div style={{flex:1,overflow:"auto"}}>
                <ProgressScreen user={mu} program={programs[mu.id]}
                  history={history[mu.id]||{}} goals={goals[mu.id]||{}}
                  onUpdateGoals={g=>onUpdateGoals(mu.id,g)}
                  onUpdateUser={onUpdateUser}
                  onBack={()=>setManagingUser(null)}/>
              </div>
            )}

            {/* Edit Sessions */}
            {mv==="sessions" && (()=>{
              const userHistory = history[mu.id]||{};
              const sortedSessions = Object.entries(userHistory).sort(([a],[b])=>b.localeCompare(a));
              const [expandedSess, setExpandedSess] = useState(null);
              const [addingExTo, setAddingExTo] = useState(null); // session key

              function updateSession(date, patch){
                const nh = {...userHistory, [date]: {...userHistory[date], ...patch}};
                onUpdateHistory(mu.id, nh);
              }
              function updateNamedLog(date, newLog){
                updateSession(date, {namedLog: newLog});
              }
              function addSetToEx(date, exName){
                const sess = userHistory[date];
                const log = {...(sess.namedLog||{})};
                if(!log[exName]) log[exName]=[];
                log[exName] = [...log[exName], {weight:"0",reps:"0",rpe:0}];
                updateNamedLog(date, log);
              }
              function updateSet(date, exName, setIdx, patch){
                const sess = userHistory[date];
                const log = {...(sess.namedLog||{})};
                log[exName] = (log[exName]||[]).map((s,i)=>i===setIdx?{...s,...patch}:s);
                updateNamedLog(date, log);
              }
              function deleteSet(date, exName, setIdx){
                const sess = userHistory[date];
                const log = {...(sess.namedLog||{})};
                log[exName] = (log[exName]||[]).filter((_,i)=>i!==setIdx);
                if(log[exName].length===0) delete log[exName];
                updateNamedLog(date, log);
              }
              function addExToSession(date, exName){
                const sess = userHistory[date];
                const log = {...(sess.namedLog||{})};
                if(log[exName]) return; // already exists
                log[exName] = [{weight:"0",reps:"0",rpe:0}];
                updateNamedLog(date, log);
                setAddingExTo(null);
              }
              function deleteExFromSession(date, exName){
                const sess = userHistory[date];
                const log = {...(sess.namedLog||{})};
                delete log[exName];
                updateNamedLog(date, log);
              }

              return (
                <>
                  {header("EDIT SESSIONS · "+sortedSessions.length+" SESSIONS")}
                  <div style={{flex:1,overflow:"auto",padding:"20px 24px",display:"flex",flexDirection:"column",gap:10}}>
                    {sortedSessions.length===0&&(
                      <div style={{color:"#2a2a2a",textAlign:"center",padding:60,fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2}}>NO SESSIONS YET</div>
                    )}
                    {sortedSessions.map(([date,sess])=>{
                      const ts=Object.values(sess.namedLog||{}).flat().filter(Boolean).length;
                      const exNames=Object.keys(sess.namedLog||{});
                      const isExpanded = expandedSess===date;
                      return (
                        <div key={date} style={{background:"#0d0d0d",border:`2px solid ${isExpanded?mu.color+"44":"#1a1a1a"}`,
                          borderRadius:16,overflow:"hidden"}}>
                          {/* Session header — tap to expand */}
                          <div onClick={()=>setExpandedSess(isExpanded?null:date)}
                            style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer"}}>
                            <div style={{flex:1}}>
                              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"#F0F0F0",letterSpacing:2,lineHeight:1}}>{sess.day}</div>
                              <div style={{color:"#444",fontSize:12,marginTop:2}}>
                                {new Date((sess.date||dateOf(date))+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"})}
                                {" · "}{ts} sets · {exNames.length} exercises
                              </div>
                            </div>
                            <div style={{color:"#333",fontSize:16}}>{isExpanded?"▼":"▶"}</div>
                            <button onClick={e=>{e.stopPropagation();
                              const nh={...userHistory};delete nh[date];onUpdateHistory(mu.id,nh);
                            }} style={{background:"rgba(255,60,60,0.08)",border:"1px solid rgba(255,60,60,0.25)",
                              borderRadius:9,color:"#FF6060",padding:"8px 12px",cursor:"pointer",fontSize:14}}>🗑</button>
                          </div>

                          {/* Expanded: exercise and set editor */}
                          {isExpanded&&(
                            <div style={{borderTop:`1px solid #1e1e1e`,padding:"14px 18px",display:"flex",flexDirection:"column",gap:12}}>
                              {exNames.map(exName=>{
                                const sets = (sess.namedLog[exName]||[]).filter(Boolean);
                                return (
                                  <div key={exName} style={{background:"#111",borderRadius:12,border:"1px solid #1e1e1e",overflow:"hidden"}}>
                                    {/* Exercise header */}
                                    <div style={{padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",
                                      borderBottom:"1px solid #1a1a1a"}}>
                                      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:mu.color,letterSpacing:2}}>{exName}</div>
                                      <div style={{display:"flex",gap:6}}>
                                        <button onClick={()=>addSetToEx(date,exName)}
                                          style={{background:`${mu.color}18`,border:`1px solid ${mu.color}44`,borderRadius:7,
                                            color:mu.color,padding:"4px 10px",cursor:"pointer",fontSize:10,
                                            fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1,fontWeight:700}}>+ SET</button>
                                        <button onClick={()=>deleteExFromSession(date,exName)}
                                          style={{background:"rgba(255,60,60,0.08)",border:"1px solid rgba(255,60,60,0.2)",
                                            borderRadius:7,color:"#FF6060",padding:"4px 8px",cursor:"pointer",fontSize:12}}>✕</button>
                                      </div>
                                    </div>
                                    {/* Sets */}
                                    <div style={{padding:"8px 14px",display:"flex",flexDirection:"column",gap:6}}>
                                      {sets.map((s,si)=>(
                                        <div key={si} style={{display:"flex",alignItems:"center",gap:8}}>
                                          <div style={{color:"#333",fontSize:10,fontFamily:"'Barlow Condensed',sans-serif",
                                            letterSpacing:1,width:28,flexShrink:0}}>S{si+1}</div>
                                          <div style={{display:"flex",gap:4,flex:1,alignItems:"center"}}>
                                            <input type="number" value={s.weight||""} placeholder="0"
                                              onChange={e=>updateSet(date,exName,si,{weight:e.target.value})}
                                              style={{width:60,background:"#1a1a1a",border:"1px solid #252525",borderRadius:6,
                                                color:"#F0F0F0",padding:"6px 8px",fontSize:13,fontFamily:"'Bebas Neue',sans-serif",
                                                textAlign:"center",outline:"none"}}/>
                                            <span style={{color:"#333",fontSize:10}}>kg ×</span>
                                            <input type="number" value={s.reps||""} placeholder="0"
                                              onChange={e=>updateSet(date,exName,si,{reps:e.target.value})}
                                              style={{width:50,background:"#1a1a1a",border:"1px solid #252525",borderRadius:6,
                                                color:"#F0F0F0",padding:"6px 8px",fontSize:13,fontFamily:"'Bebas Neue',sans-serif",
                                                textAlign:"center",outline:"none"}}/>
                                            <span style={{color:"#333",fontSize:10}}>reps</span>
                                            <span style={{color:"#333",fontSize:10,marginLeft:4}}>RPE</span>
                                            <input type="number" value={s.rpe||""} placeholder="—" min="1" max="10"
                                              onChange={e=>updateSet(date,exName,si,{rpe:parseFloat(e.target.value)||0})}
                                              style={{width:40,background:"#1a1a1a",border:"1px solid #252525",borderRadius:6,
                                                color:"#F0F0F0",padding:"6px 6px",fontSize:13,fontFamily:"'Bebas Neue',sans-serif",
                                                textAlign:"center",outline:"none"}}/>
                                          </div>
                                          <button onClick={()=>deleteSet(date,exName,si)}
                                            style={{background:"none",border:"1px solid #2a1a1a",borderRadius:6,
                                              color:"#884444",padding:"4px 6px",cursor:"pointer",fontSize:10,flexShrink:0}}>✕</button>
                                        </div>
                                      ))}
                                      {sets.length===0&&(
                                        <div style={{color:"#2a2a2a",fontSize:11,textAlign:"center",padding:8}}>No sets — tap + SET to add</div>
                                      )}
                                    </div>
                                  </div>
                                );
                              })}

                              {/* Add exercise to session */}
                              {addingExTo===date ? (
                                <div style={{background:"#111",borderRadius:12,border:`1px solid ${mu.color}44`,padding:12}}>
                                  <div style={{color:"#555",fontSize:10,letterSpacing:2,marginBottom:8,fontFamily:"'Barlow Condensed',sans-serif"}}>ADD EXERCISE</div>
                                  <TouchTextInput value="" onChange={name=>{if(name.trim())addExToSession(date,name.trim());}}
                                    placeholder="Type exercise name + Done" color={mu.color}/>
                                  <button onClick={()=>setAddingExTo(null)} style={{background:"none",border:"none",
                                    color:"#444",cursor:"pointer",fontSize:11,marginTop:6,
                                    fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>CANCEL</button>
                                </div>
                              ) : (
                                <button onClick={()=>setAddingExTo(date)}
                                  style={{background:"none",border:`1px dashed ${mu.color}33`,borderRadius:10,
                                    color:`${mu.color}66`,padding:"10px",cursor:"pointer",fontSize:11,
                                    fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2}}>
                                  + ADD EXERCISE TO SESSION
                                </button>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </>
              );
            })()}
          </div>
        );
      })()}

      {/* JOIN SESSION picker overlay */}
      {showAddPicker && (
        <div style={{
          position: "absolute", inset: 0, zIndex: 200,
          background: "rgba(0,0,0,0.9)", backdropFilter: "blur(14px)",
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center", gap: 36, padding: 40,
        }} onClick={e => { if (e.target === e.currentTarget) setShowAddPicker(false); }}>

          <div style={{ textAlign:"center" }}>
            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:13, color:"#444",
              letterSpacing:6, marginBottom:6 }}>SESSION IN PROGRESS</div>
            <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:64, color:"#F0F0F0",
              letterSpacing:3, lineHeight:1 }}>WHO'S<br/>JOINING?</div>
          </div>

          <div style={{ display:"flex", gap:22, flexWrap:"wrap", justifyContent:"center" }}>
            {available.map(u => {
              const prog = programs[u.id];
              const userHist2=history[u.id]||{};
              const today = prog?.days?.find(d => d.scheduleType==="frequency"?freqAvailable(d,userHist2,u.id):getDays(d).includes(todayStr()));
              return (
                <button key={u.id} onClick={() => addAthlete(u.id)} style={{
                  background: `${u.color}10`, border: `3px solid ${u.color}44`,
