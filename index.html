// ══════════════════════════════════════════════════════════════════════════════
// WORKOUT PANEL — fully independent per athlete
// ══════════════════════════════════════════════════════════════════════════════
function WorkoutPanel({ user, program, history, onSaveWorkout, onSaveAsProgram, onLeave }) {
  const [phase,setPhase]=useState("pick");
  const [selDay,setSelDay]=useState(null);
  const [exercises,setExercises]=useState([]); // reorderable copy
  const [currentExId,setCurrentExId]=useState(null);
  const [logged,setLogged]=useState({}); // keyed by exercise id
  const [setIdx,setSetIdx]=useState(0);
  const [timer,setTimer]=useState(null);
  const [startTime,setStartTime]=useState(null);
  const [sessionStats,setSessionStats]=useState(null);
  const [useKg,setUseKg]=useState(false); // default lbs
  const [leaving,setLeaving]=useState(false);
  const leaveStats=useState(null);
  const [sessionNotes,setSessionNotes]=useState("");
  const [showAddExModal,setShowAddExModal]=useState(false); // [stats, setStats] — computed synchronously on leave
  const [dragOver,setDragOver]=useState(null);
  const dragSrc=useState(null);
  const [editingSet,setEditingSet]=useState(null); // {exId, setIdx} or null
  const sessionKeyRef=useRef(null); // unique key for this session, set on first finish
  const totalRestMsRef=useRef(0);   // accumulated rest milliseconds (excluded from calorie calc)
  const restStartRef=useRef(null);  // timestamp when current rest timer began
  const scrollRef=useRef(null);     // ref to the main scrollable content div
  const scrollIntervalRef=useRef(null); // interval for hold-to-scroll
  const [sessionMode,setSessionMode]=useState("traditional"); // "traditional" | "circuit"
  const [exerciseNotes,setExerciseNotes]=useState({}); // keyed by exercise id
  const [isFreestyle,setIsFreestyle]=useState(false);
  const [savedAsProgram,setSavedAsProgram]=useState(false);
  const [freestyleName,setFreestyleName]=useState("");
  const [showSmartModal,setShowSmartModal]=useState(false);
  const C=user.color;
  const RECOVERY_KEY = `gft-active-${user.id}`;

  // Auto-save active session state for crash recovery
  useEffect(()=>{
    if(phase==="active" && selDay && exercises.length>0){
      try{
        localStorage.setItem(RECOVERY_KEY, JSON.stringify({
          selDay, exercises, logged, exerciseNotes, sessionNotes,
          currentExId, setIdx, sessionMode, isFreestyle, freestyleName,
          startTime, sessionKey: sessionKeyRef.current,
          savedAt: Date.now()
        }));
      }catch{}
    }
    if(phase==="done" || phase==="pick"){
      try{ localStorage.removeItem(RECOVERY_KEY); }catch{}
    }
  },[phase, logged, exercises, exerciseNotes, sessionNotes, currentExId]);

  // Check for recoverable session on mount
  const [recoveryData, setRecoveryData] = useState(()=>{
    try{
      const raw = localStorage.getItem(RECOVERY_KEY);
      if(raw){
        const d = JSON.parse(raw);
        if(d.savedAt && Date.now() - d.savedAt < 12*60*60*1000) return d;
        localStorage.removeItem(RECOVERY_KEY);
      }
    }catch{}
    return null;
  });

  function restoreSession(data){
    setSelDay(data.selDay);
    setExercises(data.exercises);
    setLogged(data.logged||{});
    setExerciseNotes(data.exerciseNotes||{});
    setSessionNotes(data.sessionNotes||"");
    setCurrentExId(data.currentExId);
    setSetIdx(data.setIdx||0);
    setSessionMode(data.sessionMode||"traditional");
    setIsFreestyle(data.isFreestyle||false);
    setFreestyleName(data.freestyleName||"");
    setStartTime(data.startTime||Date.now());
    sessionKeyRef.current = data.sessionKey||null;
    setPhase("active");
    setRecoveryData(null);
  }

  function dismissRecovery(){
    try{ localStorage.removeItem(RECOVERY_KEY); }catch{}
    setRecoveryData(null);
  }

  // Get the last full session for a given day label
  function getLastSession(dayLabel) {
    const entries = Object.entries(history)
      .filter(([,s])=>s?.day===dayLabel)
      .sort(([a],[b])=>b.localeCompare(a));
    return entries.length ? entries[0][1] : null;
  }

  // Check if a day label was already completed today (prevents duplicate same-day workouts)
  function isDoneToday(dayLabel) {
    const todayIso = todayIsoLocal();
    return Object.entries(history).some(([key,sess])=> {
      if(!sess || sess.day !== dayLabel) return false;
      const sessDate = sess.date || dateOf(key);
      return sessDate === todayIso && !sess.partial;
    });
  }

  // Start a day pre-loaded with last session's weights
  function repeatLastSession(day) {
    const last = getLastSession(day.label);
    const exCopy = day.exercises.map(e=>({...e}));
    setSelDay(day);
    setExercises(exCopy);
    setCurrentExId(exCopy[0]?.id||null);
    setLogged({});
    setExerciseNotes(buildCarriedNotes(exCopy));
    setSetIdx(0);
    setStartTime(Date.now());
    sessionKeyRef.current=null;
    setSessionMode(day.defaultMode||"traditional");
    setIsFreestyle(false);
    setSavedAsProgram(false);
    setPhase("active");
  }

  // Look up the most recent logged weight for an exercise name from history
  function getLastWorkoutData(exName) {
    const sessions = Object.entries(history).sort(([a],[b])=>b.localeCompare(a)); // newest first
    for(const [,sess] of sessions) {
      if(!sess) continue;
      const sets = (sess.namedLog||{})[exName];
      if(sets&&sets.length) {
        const best = sets.filter(Boolean).reduce((b,s)=>{
          return (parseFloat(s.weight)||0)>(parseFloat(b?.weight)||0)?s:b;
        }, sets[0]);
        return best; // {weight (kg), reps, rpe}
      }
    }
    return null;
  }

  // Find the single highest-weight set ever logged for an exercise across all sessions
  function getPersonalBestData(exName) {
    let best = null;
    for(const [,sess] of Object.entries(history)) {
      if(!sess) continue;
      const sets = (sess.namedLog||{})[exName];
      if(!sets?.length) continue;
      for(const s of sets.filter(Boolean)) {
        if(!s.weight || s.weight==="BW") continue;
        const w = parseFloat(s.weight)||0;
        if(!best || w > (parseFloat(best.weight)||0)) best = s;
      }
    }
    return best; // {weight (kg), reps, rpe} or null
  }

  // Build initial exerciseNotes map from history for a set of exercises (carry-over from last session)
  function buildCarriedNotes(exArray) {
    const notes = {};
    const sessions = Object.entries(history).sort(([a],[b])=>b.localeCompare(a)); // newest first
    exArray.forEach(ex => {
      for(const [,sess] of sessions) {
        if(!sess?.exerciseNotes) continue;
        const note = sess.exerciseNotes[ex.name];
        if(note?.trim()) { notes[ex.id] = note.trim(); break; }
      }
    });
    return notes;
  }

  function calcRecommended(ex) {
    const prog = ex.progression;
    if(!prog||parseFloat(prog.value)<=0) return null;
    const last = getLastWorkoutData(ex.name);
    if(!last||!last.weight||last.weight==="BW") return null;
    const lastKg = parseFloat(last.weight)||0;
    if(!lastKg) return null;
    let recKg;
    if(prog.type==="pct") {
      recKg = lastKg * (1 + parseFloat(prog.value)/100);
    } else {
      // fixed value stored as lbs in progression, convert to kg
      recKg = lastKg + (parseFloat(prog.value)/2.20462);
    }
    return { kg: parseFloat(recKg.toFixed(2)), lastKg, lastReps: last.reps, lastRpe: last.rpe||null };
  }

  const currentEx = exercises.find(e=>e.id===currentExId);
  const setsForEx = logged[currentExId]||[];
  const completedSetCount = s => (logged[s.id]||[]).filter(Boolean).length;
  const isExDone = s => completedSetCount(s) >= s.sets;
  const anyLogged = Object.values(logged).some(sets => sets?.filter(Boolean).length > 0);

  // Superset helpers
  function getGroupMembers(exId){
    const ex = exercises.find(e=>e.id===exId);
    if(!ex?.groupId) return [ex];
    return exercises.filter(e=>e.groupId===ex.groupId);
  }
  function nextInGroup(exId){
    // After logging a set for exId, find the next group member that hasn't caught up
    const group = getGroupMembers(exId);
    if(group.length<=1) return null; // not a superset
    const myCount = (logged[exId]||[]).filter(Boolean).length;
    // Find group members with fewer sets than we just logged
    const idx = group.findIndex(e=>e.id===exId);
    for(let offset=1;offset<group.length;offset++){
      const next = group[(idx+offset)%group.length];
      const theirCount = (logged[next.id]||[]).filter(Boolean).length;
      if(theirCount < myCount && !isExDone(next)) return next;
    }
    return null; // round complete
  }

  function handleLeave(){
    let stats = sessionStats;
    if(!stats && phase==="active" && startTime){
      flushRestTimer();
      const activeMs = Math.max(0, (Date.now()-startTime) - totalRestMsRef.current);
      const durationMin = Math.max(1, Math.round(activeMs/60000));
      const allSets = Object.values(logged).flat().filter(Boolean);
      const rpeSets = allSets.filter(s=>s?.rpe>0);
      const avgRpe = rpeSets.length ? rpeSets.reduce((a,s)=>a+s.rpe,0)/rpeSets.length : null;
      const calories = calcCalories(user.biometrics, durationMin, avgRpe);
      stats = {durationMin, calories, avgRpe: avgRpe ? parseFloat(avgRpe.toFixed(1)) : null};
    }
    // Save partial session if any sets were logged
    if(phase==="active" && selDay) {
      const namedLog={};
      exercises.forEach(ex=>{
        const sets=(logged[ex.id]||[]).filter(s=>s&&!s.skipped);
        if(sets.length) namedLog[ex.name]=sets;
      });
      if(Object.keys(namedLog).length>0) {
        const dateStr=todayIsoLocal();
        if(!sessionKeyRef.current) sessionKeyRef.current=`${dateStr}_${Date.now()}`;
        const dk=sessionKeyRef.current;
        onSaveWorkout(dk,{date:dateStr,day:selDay.label,exercises:logged,namedLog,...(stats||{}),partial:true,notes:sessionNotes.trim()||null,
          exerciseNotes:Object.fromEntries(Object.entries(exerciseNotes).map(([eid,n])=>{
            const ex=exercises.find(e=>e.id===eid);
            return ex&&n?.trim()?[ex.name,n.trim()]:null;
          }).filter(Boolean))||null});
      }
    }
    leaveStats[1](stats);
    setLeaving(true);
  }

  function startDay(day){
    const exCopy = day.exercises.map(e=>({...e}));
    setSelDay(day);
    setExercises(exCopy);
    setCurrentExId(exCopy[0]?.id||null);
    setLogged({});
    setExerciseNotes(buildCarriedNotes(exCopy));
    setSetIdx(0);
    setStartTime(Date.now());
    sessionKeyRef.current=null;
    setSessionMode(day.defaultMode||"traditional");
    setIsFreestyle(false);
    setSavedAsProgram(false);
    setFreestyleName("");
    setPhase("active");
  }

  function reopenTodaySession(day){
    // Find today's completed session for this day label
    const todayIso = todayIsoLocal();
    const entry = Object.entries(history)
      .filter(([key,sess])=>{
        if(!sess || sess.day!==day.label) return false;
        const sessDate = sess.date || dateOf(key);
        return sessDate === todayIso;
      })
      .sort(([a],[b])=>b.localeCompare(a))[0]; // most recent if multiple
    if(!entry) return startDay(day); // fallback to fresh start

    const [sessKey, sess] = entry;
    const namedLog = sess.namedLog || {};

    // Rebuild exercises from the program day, preserving order
    // Add any exercises from namedLog that aren't in the program (added mid-session)
    const programExNames = day.exercises.map(e=>e.name);
    const exCopy = day.exercises.map(e=>({...e}));
    Object.keys(namedLog).forEach(name=>{
      if(!programExNames.includes(name)){
        exCopy.push({id:mkId(),name,sets:3,reps:"10",rest:60,setup:"",groupId:null,progression:{type:"fixed",value:0}});
      }
    });

    // Rebuild logged sets from namedLog, keyed by exercise id
    const logMap = {};
    exCopy.forEach(ex=>{
      const sets = namedLog[ex.name];
      if(sets && sets.length > 0){
        logMap[ex.id] = sets.map(s=>({
          weight: s.weight, reps: s.reps, rpe: s.rpe||0
        }));
      }
    });

    setSelDay(day);
    setExercises(exCopy);
    setLogged(logMap);
    setExerciseNotes(sess.exerciseNotes||{});
    setSessionNotes(sess.notes||"");
    setCurrentExId(exCopy[0]?.id||null);
    setSetIdx(0);
    setStartTime(Date.now());
    sessionKeyRef.current = sessKey; // reuse the same key so finish overwrites
    setSessionMode(day.defaultMode||"traditional");
    setIsFreestyle(false);
    setSavedAsProgram(false);
    setFreestyleName("");
    setPhase("active");
  }

  function startFreestyle(){
    const freeDay={id:mkId(),label:"Freestyle",exercises:[],defaultMode:"traditional"};
    setSelDay(freeDay);
    setExercises([]);
    setCurrentExId(null);
    setLogged({});
    setExerciseNotes({});
    setSetIdx(0);
    setStartTime(Date.now());
    sessionKeyRef.current=null;
    setSessionMode("traditional");
    setIsFreestyle(true);
    setSavedAsProgram(false);
    setFreestyleName("");
    setPhase("active");
    // Auto-open add exercise modal so user isn't staring at empty screen
    setTimeout(()=>setShowAddExModal(true),100);
  }

  function startGeneratedWorkout(workout){
    const exList = workout.exercises.map(ex=>({
      id:mkId(), name:ex.name, sets:ex.sets, reps:ex.reps, rest:ex.rest,
      setup:"", groupId:null, progression:{type:"fixed",value:0}
    }));
    const genDay={id:mkId(),label:workout.label,exercises:exList,defaultMode:"traditional"};
    setSelDay(genDay);
    setExercises(exList);
    setCurrentExId(exList[0]?.id||null);
    setLogged({});
    setExerciseNotes(buildCarriedNotes(exList));
    setSetIdx(0);
    setStartTime(Date.now());
    sessionKeyRef.current=null;
    setSessionMode("traditional");
    setIsFreestyle(true);
    setSavedAsProgram(false);
    setFreestyleName(workout.label);
    setShowSmartModal(false);
    setPhase("active");
  }

  function logSet(data){
    const nl={...logged};
    if(!nl[currentExId]) nl[currentExId]=[];
    const si = nl[currentExId].filter(Boolean).length; // next open slot
    nl[currentExId] = [...(nl[currentExId]||[])];
    nl[currentExId][si] = {...data, done:true};
    setLogged(nl);
    setSetIdx(si+1);

    // Clear extra-set flag so it resets to the button
    setExercises(prev=>prev.map(x=>x.id===currentExId?{...x,_addingExtra:false}:x));

    // Check superset: advance to next in group without rest
    const group = getGroupMembers(currentExId);
    if(group.length > 1){
      const myCount = si+1; // how many sets I now have
      const idx = group.findIndex(e=>e.id===currentExId);
      // Find next group member that hasn't caught up to this round
      for(let offset=1;offset<group.length;offset++){
        const next = group[(idx+offset)%group.length];
        const theirCount = (nl[next.id]||[]).filter(Boolean).length;
        if(theirCount < myCount && !isExDone(next)){
          // Advance to next in superset — no rest between superset exercises
          setCurrentExId(next.id);
          setSetIdx(theirCount);
          return;
        }
      }
    }

    // Not in a superset, or superset round complete → rest timer
    restStartRef.current = Date.now();
    setTimer({dur:currentEx.rest, key:Date.now()});
  }

  function editSet(exId, si){ setEditingSet({exId,si}); }
  function saveEditedSet(exId, si, data){
    const nl={...logged,[exId]:[...(logged[exId]||[])]};
    nl[exId][si]={...nl[exId][si],...data,done:true};
    setLogged(nl);
    setEditingSet(null);
  }
  function deleteSet(exId, si){
    const nl={...logged,[exId]:[...(logged[exId]||[])]};
    nl[exId].splice(si,1);
    if(nl[exId].length===0) delete nl[exId];
    setLogged(nl);
    setEditingSet(null);
    // update setIdx if editing active exercise
    if(exId===currentExId) setSetIdx(Math.max(0,(logged[exId]||[]).filter(Boolean).length-1));
  }

  function skipExercise(exId){
    // Mark all remaining sets as skipped
    const ex = exercises.find(e=>e.id===exId);
    if(!ex) return;
    const nl={...logged};
    const existing=(nl[exId]||[]).filter(Boolean);
    const totalNeeded=ex.sets;
    const newSets=[...existing];
    while(newSets.length<totalNeeded) newSets.push({weight:"BW",reps:0,rpe:0,done:true,skipped:true});
    nl[exId]=newSets;
    setLogged(nl);
    // Jump to next incomplete exercise
    const idx=exercises.findIndex(e=>e.id===exId);
    if(sessionMode==="circuit"){
      const len=exercises.length;
      for(let offset=1;offset<=len;offset++){
        const next=exercises[(idx+offset)%len];
        if(next.id!==exId&&!isExDone(next)){
          setCurrentExId(next.id);
          setSetIdx((logged[next.id]||[]).filter(Boolean).length);
          return;
        }
      }
    } else {
      // Traditional: try advancing linearly, else collapse
      for(let i=idx+1;i<exercises.length;i++){
        if(!isExDone(exercises[i])){ setCurrentExId(exercises[i].id); setSetIdx(0); return; }
      }
      setCurrentExId(null);
    }
  }

  function removeExerciseMidSession(exId){
    setExercises(prev=>prev.filter(e=>e.id!==exId));
    const nl={...logged};
    delete nl[exId];
    setLogged(nl);
    if(currentExId===exId){
      const remaining=exercises.filter(e=>e.id!==exId);
      setCurrentExId(remaining[0]?.id||null);
    }
  }

  function addExerciseMidSession(exName){
    const newEx={id:mkId(),name:exName,sets:3,reps:"10",rest:60,setup:"",groupId:null,progression:{type:"fixed",value:0}};
    setExercises(prev=>[...prev,newEx]);
    setCurrentExId(newEx.id);
    setSetIdx(0);
    setShowAddExModal(false);
  }

  function moveExMidSession(fromIdx, toIdx){
    if(toIdx<0) return;
    setExercises(prev=>{
      if(toIdx>=prev.length) return prev;
      const ex=[...prev];
      const [moved]=ex.splice(fromIdx,1);
      ex.splice(toIdx,0,moved);
      return ex;
    });
  }

  const [insertAtIdx, setInsertAtIdx] = useState(null); // index to insert after

  function insertExMidSession(exName, afterIdx){
    const newEx={id:mkId(),name:exName,sets:3,reps:"10",rest:60,setup:"",groupId:null,progression:{type:"fixed",value:0}};
    setExercises(prev=>{
      const ex=[...prev];
      ex.splice(afterIdx+1,0,newEx);
      return ex;
    });
    setCurrentExId(newEx.id);
    setSetIdx(0);
    setInsertAtIdx(null);
  }

  function flushRestTimer(){
    if(restStartRef.current){ totalRestMsRef.current += Date.now()-restStartRef.current; restStartRef.current=null; }
  }

  function skipToNext(){
    flushRestTimer();
    setTimer(null);

    if(sessionMode==="circuit"){
      // Circuit: advance to next exercise that still has sets remaining
      const idx = exercises.findIndex(e=>e.id===currentExId);
      const len = exercises.length;
      const curEx = exercises[idx];
      const curSetsLogged = (logged[curEx?.id]||[]).filter(Boolean).length;
      const curGroup = curEx?.groupId;
      
      // Check if we just finished a superset round (all group members have same count)
      let supersetRoundJustCompleted = false;
      if(curGroup){
        const groupMembers = exercises.filter(e=>e.groupId===curGroup);
        supersetRoundJustCompleted = groupMembers.every(e=>
          (logged[e.id]||[]).filter(Boolean).length === curSetsLogged
        );
      }
      
      for(let offset=1; offset<=len; offset++){
        const nextIdx = (idx+offset)%len;
        const next = exercises[nextIdx];
        
        // Skip same group members ONLY if the round is NOT complete
        // If round just completed, we need to wrap back to the first member for the next round
        if(curGroup && next.groupId===curGroup && !supersetRoundJustCompleted){
          continue; // mid-round: skip group members (they advance via logSet)
        }
        
        // Check if this exercise still needs sets
        const setsLogged = (logged[next.id]||[]).filter(Boolean).length;
        if(setsLogged < next.sets){
          setCurrentExId(next.id);
          setSetIdx(setsLogged);
          return;
        }
      }
      // All exercises fully done — stay put
    } else {
      // Traditional: after rest, return to first incomplete exercise in the same superset group
      const group = getGroupMembers(currentExId);
      if(group.length>1){
        const first = group.find(e=>!isExDone(e));
        if(first){
          setCurrentExId(first.id);
          setSetIdx((logged[first.id]||[]).filter(Boolean).length);
          return;
        }
      }
      // Collapse current exercise, user must tap to reopen
      setCurrentExId(null);
    }
  }

  function selectEx(id){
    flushRestTimer();
    setTimer(null);
    setCurrentExId(id);
    setSetIdx((logged[id]||[]).filter(Boolean).length);
  }

  function finish(){
    const dateStr=todayIsoLocal();
    // Reuse session key if going back and re-finishing; otherwise create unique key
    if(!sessionKeyRef.current) sessionKeyRef.current=`${dateStr}_${Date.now()}`;
    const dk=sessionKeyRef.current;
    const namedLog={};
    exercises.forEach(ex=>{
      const sets=(logged[ex.id]||[]).filter(Boolean);
      if(sets.length) namedLog[ex.name]=sets;
    });
    flushRestTimer(); // capture any in-progress rest
    const totalMs = startTime ? Date.now()-startTime : 0;
    const activeMs = Math.max(0, totalMs - totalRestMsRef.current);
    const durationMin = startTime ? Math.max(1, Math.round(activeMs/60000)) : null;
    const allSets=Object.values(namedLog).flat().filter(Boolean);
    const rpeSets=allSets.filter(s=>s?.rpe>0);
    const avgRpe=rpeSets.length?rpeSets.reduce((a,s)=>a+s.rpe,0)/rpeSets.length:null;
    const calories=calcCalories(user.biometrics,durationMin,avgRpe);
    const stats={durationMin,calories,avgRpe:avgRpe?parseFloat(avgRpe.toFixed(1)):null};
    setSessionStats(stats);
    onSaveWorkout(dk,{date:dateStr,day:selDay.label,exercises:logged,namedLog,...stats,notes:sessionNotes.trim()||null,

        const ex=exercises.find(e=>e.id===eid);

    setPhase("done");

    const si=arr.findIndex(x=>x.id===srcId);

                      fontFamily:"'Barlow Condensed',sans-serif"}}>✓ DONE</div>}

              {/* Mini progress dots for frequency */}
              {isFreq&&(
                <div style={{display:"flex",gap:6,marginTop:10}}>

                    <div key={i} style={{flex:1,height:4,borderRadius:4,

            {/* Reopen today's session */}

                <button onClick={e=>{e.stopPropagation();startDay(d);}}

            onPointerEnter={e=>{e.currentTarget.style.borderColor=C;e.currentTarget.style.background=`${C}12`;}}

          equipment={user.equipment||[]}

    </div>

  // ── Done ─────────────────────────────────────────────────────
  if(phase==="done"){
    const ts=Object.values(logged).reduce((a,b)=>a+(b?.filter(Boolean).length||0),0);
    const hasBio=user.biometrics?.weightKg&&user.biometrics?.age;
    const statItems=[
      {v:ts,l:"SETS"},
      sessionStats?.durationMin&&{v:sessionStats.durationMin+"m",l:"ACTIVE TIME"},
      sessionStats?.calories&&{v:sessionStats.calories,l:"KCAL 🔥"},
      sessionStats?.avgRpe&&{v:"RPE "+sessionStats.avgRpe,l:"AVG EFFORT"},
    ].filter(Boolean);
    return (
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",
        flex:1,minHeight:0,background:"#0a0a0a",gap:18,padding:24,paddingBottom:40,textAlign:"center",
        overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
        <div style={{fontSize:52}}>🏆</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:52,color:C,letterSpacing:3,lineHeight:1}}>DONE!</div>
        <div style={{color:"#555",fontSize:14}}>{isFreestyle?"⚡ ":""}{selDay.label}</div>
        {!exercises.every(isExDone)&&<div style={{background:"#1a1a0a",border:"1px solid #3a3a1a",
          borderRadius:8,padding:"4px 12px",color:"#aaa888",fontSize:11,letterSpacing:2}}>PARTIAL SESSION</div>}
        <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(statItems.length,2)},1fr)`,gap:10,width:"100%",maxWidth:320}}>
          {statItems.map(s=>(
            <div key={s.l} style={{background:"#141414",border:`1px solid ${C}22`,borderRadius:14,padding:"14px 10px"}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,color:C,lineHeight:1}}>{s.v}</div>

        {/* Session notes */}
        <div style={{width:"100%",maxWidth:320}}>
          <div style={{color:"#444",fontSize:10,letterSpacing:3,marginBottom:8,fontFamily:"'Barlow Condensed',sans-serif",textAlign:"left"}}>

        {/* Save as Program — shown for freestyle sessions or any session with exercises */}

          <div style={{width:"100%",maxWidth:320,background:"#0d0d0d",border:`2px solid ${C}33`,

              {exercises.map(ex=>{
                const sets=(logged[ex.id]||[]).filter(Boolean);
                const bestSet=sets.reduce((b,s)=>(parseFloat(s?.weight)||0)>(parseFloat(b?.weight)||0)?s:b,sets[0]);
                return (
                  <div key={ex.id} style={{display:"flex",alignItems:"center",gap:8,
                    background:"#111",borderRadius:8,padding:"8px 10px"}}>
                    <div style={{color:C,fontSize:11,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",flex:1}}>{ex.name}</div>
                    <div style={{color:"#555",fontSize:10}}>{sets.length} sets · {bestSet?.reps||ex.reps} reps</div>
                  </div>
                );
              })}
            </div>
            <button onClick={()=>{
              const name=freestyleName.trim()||"Freestyle";
              // Build exercise data from what was logged
              const exData=exercises.map(ex=>{
                const sets=(logged[ex.id]||[]).filter(Boolean);
                const maxReps=sets.length?Math.max(...sets.map(s=>parseInt(s.reps)||0)):parseInt(ex.reps)||10;
                return {name:ex.name,sets:Math.max(ex.sets,sets.length),reps:maxReps,rest:ex.rest||60};
              });
              onSaveAsProgram({label:name,defaultMode:sessionMode,exercises:exData});
              setSavedAsProgram(true);
            }} style={{width:"100%",height:52,borderRadius:12,background:C,border:"none",
              color:"#000",fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:3,
              cursor:"pointer",boxShadow:`0 4px 20px ${C}33`}}>
              💾 SAVE TO PROGRAM
            </button>
          </div>
        )}

        {savedAsProgram&&(
          <div style={{width:"100%",maxWidth:320,background:"#0a1a0a",border:"1px solid #2a4a2a",
            borderRadius:12,padding:"14px 16px",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>✓</span>
            <div>
              <div style={{color:"#7ddd7d",fontSize:13,fontWeight:700}}>Saved to program!</div>
              <div style={{color:"#3a5a3a",fontSize:11,marginTop:2}}>
                "{freestyleName.trim()||"Freestyle"}" added with {exercises.length} exercises
              </div>
            </div>
          </div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:10,width:"100%",maxWidth:280}}>
          <Btn full label="← BACK TO SESSION" icon="" bg="transparent" color={C} border={`${C}44`}
            onClick={()=>{setPhase("active");setSessionStats(null);}} />
          <Btn full label="NEW WORKOUT" icon="↩" bg={C} color="#000"
            onClick={()=>{setPhase("pick");setSelDay(null);setLogged({});setExerciseNotes({});setSessionStats(null);setSessionNotes("");sessionKeyRef.current=null;setIsFreestyle(false);setSavedAsProgram(false);setFreestyleName("");}} />
          <Btn full label="LEAVE SESSION" icon="✓" bg="transparent" color="#555" border="#2a2a2a" onClick={onLeave} />
        </div>
      </div>
    );
  }

  // ── Active ────────────────────────────────────────────────────
  const doneCount=exercises.filter(isExDone).length;
  return (
    <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0,background:"#0a0a0a",position:"relative"}}>
      {showAddExModal&&(
        <AddExerciseModal color={C} history={history||{}} onAdd={name=>{
          if(insertAtIdx!==null){
            insertExMidSession(name, insertAtIdx);
          } else {
            addExerciseMidSession(name);
          }
          setShowAddExModal(false);
        }} onClose={()=>{setShowAddExModal(false);setInsertAtIdx(null);}}/>
      )}
      {timer && (()=>{
        // Compute next exercise preview for rest timer
        let nextPreview = null;
        if(sessionMode==="circuit"){
          const idx = exercises.findIndex(e=>e.id===currentExId);
          const len = exercises.length;
          const curEx = exercises[idx];
          const curSetsLogged = (logged[curEx?.id]||[]).filter(Boolean).length;
          const curGroup = curEx?.groupId;
          
          let supersetRoundJustCompleted = false;
          if(curGroup){
            const groupMembers = exercises.filter(e=>e.groupId===curGroup);
            supersetRoundJustCompleted = groupMembers.every(e=>
              (logged[e.id]||[]).filter(Boolean).length === curSetsLogged
            );
          }
          
          for(let offset=1; offset<=len; offset++){
            const nextIdx = (idx+offset)%len;
            const next = exercises[nextIdx];
            if(curGroup && next.groupId===curGroup && !supersetRoundJustCompleted) continue;
            const setsLogged = (logged[next.id]||[]).filter(Boolean).length;
            if(setsLogged < next.sets){ nextPreview=next; break; }
          }
        } else {
          // Traditional mode:
          // 1. If in a superset, show next group member that needs sets
          const group = getGroupMembers(currentExId);
          if(group.length>1){
            const first = group.find(e=>!isExDone(e));
            if(first) nextPreview=first;
          }
          // 2. If current exercise still has sets remaining, show it (next set of same exercise)
          if(!nextPreview && currentEx && !isExDone(currentEx)){
            nextPreview = currentEx;
          }
          // 3. If current is done, show next incomplete exercise in the list
          if(!nextPreview){
            const idx = exercises.findIndex(e=>e.id===currentExId);
            for(let i=1;i<exercises.length;i++){
              const next = exercises[(idx+i)%exercises.length];
              if(!isExDone(next)){ nextPreview=next; break; }
            }
          }
        }
        // Get recommended weight for next exercise
        const nextRec = nextPreview ? calcRecommended(nextPreview) : null;
        const nextLastData = nextPreview ? getLastWorkoutData(nextPreview.name) : null;
        const nextWeightKg = nextRec?.kg || (nextLastData ? parseFloat(nextLastData.weight)||0 : 0);
        const nextWeightLbs = nextWeightKg ? parseFloat((nextWeightKg*2.20462).toFixed(1)) : 0;
        const nextPlates = nextWeightLbs > 0 ? calcPlates(nextWeightLbs) : [];
        const nextSetsLogged = nextPreview ? (logged[nextPreview.id]||[]).filter(Boolean).length : 0;

        return <InlineTimer key={timer.key} duration={timer.dur} color={C}
          onDone={skipToNext} onSkip={skipToNext}
          nextEx={nextPreview} nextRec={nextRec} nextLastData={nextLastData}
          nextWeightKg={nextWeightKg} nextPlates={nextPlates}
          nextSetsLogged={nextSetsLogged} useKg={useKg}/>;
      })()}

      {/* Header */}
      <div style={{background:"#0d0d0d",borderBottom:`3px solid ${C}`,padding:"8px 10px",
        display:"flex",alignItems:"center",gap:8,flexShrink:0,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0,flex:"1 1 auto"}}>
          <Avatar user={user} size={32}/>
          <div style={{minWidth:0}}>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:C,letterSpacing:2,lineHeight:1,
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</div>
            <div style={{color:"#444",fontSize:9,letterSpacing:1}}>{isFreestyle?"⚡ ":""}{selDay.label} · {doneCount}/{exercises.length}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
          {/* Session mode toggle */}
          <div style={{display:"flex",gap:0,borderRadius:7,overflow:"hidden",border:"1px solid #252525",flexShrink:0}}>
            {[["traditional","TRAD"],["circuit","CIRC"]].map(([val,label])=>{
              const on = sessionMode===val;
              return (
                <button key={val} onClick={()=>setSessionMode(val)} style={{
                  padding:"4px 6px", cursor:"pointer", border:"none",
                  background: on ? C : "#141414",
                  color: on ? "#000" : "#555",
                  fontFamily:"'Barlow Condensed',sans-serif", fontWeight:700,
                  fontSize:9, letterSpacing:1, transition:"all 0.12s",
                  minWidth:36}}>
                  {label}
                </button>
              );
            })}
          </div>
          <UnitToggle useKg={useKg} onChange={setUseKg} color={C}/>
          <button onClick={()=>setPhase("pick")} style={{background:"none",border:"1px solid #252525",
            borderRadius:7,color:"#444",padding:"4px 8px",cursor:"pointer",fontSize:9,
            fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>← DAYS</button>
          <LeaveBtn color={C} onLeave={handleLeave} userName={user.name}/>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{display:"flex",gap:2,padding:"6px 12px 0",flexShrink:0}}>
        {exercises.map((e)=>(
          <div key={e.id} style={{flex:1,height:3,borderRadius:3,cursor:"pointer",
            background:isExDone(e)?C:e.id===currentExId?`${C}77`:"#1e1e1e"}}
            onClick={()=>selectEx(e.id)}/>
        ))}
      </div>

      {/* Scroll handles — dedicated up/down controls to avoid mis-taps on exercise cards */}
      <div style={{position:"absolute",right:4,top:"50%",transform:"translateY(-50%)",
        zIndex:20,display:"flex",flexDirection:"column",gap:3,pointerEvents:"none"}}>
        <button
          onPointerDown={e=>{e.preventDefault();scrollIntervalRef.current=setInterval(()=>{scrollRef.current?.scrollBy({top:-80});},45);}}
          onPointerUp={()=>clearInterval(scrollIntervalRef.current)}
          onPointerLeave={()=>clearInterval(scrollIntervalRef.current)}
          onPointerCancel={()=>clearInterval(scrollIntervalRef.current)}
          style={{pointerEvents:"all",width:30,height:54,borderRadius:"10px 10px 5px 5px",
            background:"rgba(16,16,16,0.94)",border:"1px solid #282828",
            color:"#505050",cursor:"pointer",fontSize:13,display:"flex",
            alignItems:"center",justifyContent:"center",
            touchAction:"none",userSelect:"none",WebkitUserSelect:"none"}}>▲</button>
        <div style={{width:30,height:2,background:"#1e1e1e",borderRadius:1,alignSelf:"center",pointerEvents:"none"}}/>
        <button
          onPointerDown={e=>{e.preventDefault();scrollIntervalRef.current=setInterval(()=>{scrollRef.current?.scrollBy({top:80});},45);}}
          onPointerUp={()=>clearInterval(scrollIntervalRef.current)}
          onPointerLeave={()=>clearInterval(scrollIntervalRef.current)}
          onPointerCancel={()=>clearInterval(scrollIntervalRef.current)}
          style={{pointerEvents:"all",width:30,height:54,borderRadius:"5px 5px 10px 10px",
            background:"rgba(16,16,16,0.94)",border:"1px solid #282828",
            color:"#505050",cursor:"pointer",fontSize:13,display:"flex",
            alignItems:"center",justifyContent:"center",
            touchAction:"none",userSelect:"none",WebkitUserSelect:"none"}}>▼</button>
      </div>

      <div ref={scrollRef} className="hide-scrollbar" style={{flex:1,minHeight:0,overflowY:"auto",padding:"10px 44px 10px 12px",display:"flex",flexDirection:"column",gap:10}}>

        {/* ── All exercises list ── */}
        <div style={{color:"#2a2a2a",fontSize:10,letterSpacing:3,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:2}}>
          {sessionMode==="circuit"
            ? "CIRCUIT MODE · AUTO-ADVANCES THROUGH EXERCISES"
            : "TRADITIONAL · TAP EXERCISE TO OPEN"}
        </div>

        {exercises.map((ex,exIdx)=>{
          const isActive = ex.id===currentExId;
          const done = isExDone(ex);
          const loggedSets = (logged[ex.id]||[]).filter(Boolean);
          const isDragTarget = dragOver===ex.id;
          // Superset visual indicators
          const prevEx = exIdx>0?exercises[exIdx-1]:null;
          const nextEx = exIdx<exercises.length-1?exercises[exIdx+1]:null;
          const inGroup = ex.groupId && exercises.filter(e=>e.groupId===ex.groupId).length>1;
          const isGroupStart = inGroup && (!prevEx || prevEx.groupId!==ex.groupId);
          const isGroupEnd = inGroup && (!nextEx || nextEx.groupId!==ex.groupId);
          const groupActive = inGroup && exercises.some(e=>e.groupId===ex.groupId && e.id===currentExId);
          return (
            <div key={ex.id}>
            {/* Superset group header */}
            {isGroupStart&&(
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,marginLeft:4}}>
                <span style={{fontSize:11}}>🔗</span>
                <div style={{color:groupActive?C:"#444",fontSize:9,fontFamily:"'Barlow Condensed',sans-serif",
                  fontWeight:700,letterSpacing:2}}>{ex.groupLabel||"SUPERSET"}</div>
                <div style={{flex:1,height:1,background:groupActive?`${C}44`:"#1e1e1e"}}/>
              </div>
            )}
            {/* Connector between superset exercises */}
            {inGroup && prevEx?.groupId===ex.groupId && (
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",margin:"-3px 0",position:"relative",zIndex:1}}>
                <div style={{width:20,height:20,borderRadius:"50%",
                  background:groupActive?`${C}33`:"#1a1a1a",
                  border:`1px solid ${groupActive?C+"55":"#2a2a2a"}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:10,color:groupActive?C:"#444"}}>↕</div>
              </div>
            )}
            <div
              draggable
              onDragStart={e=>onDragStart(e,ex.id)}
              onDragOver={e=>onDragOver(e,ex.id)}
              onDrop={e=>onDrop(e,ex.id)}
              onDragEnd={()=>{setDragOver(null);dragSrc[1](null);}}
              style={{
                background: isActive?"#111":"#0d0d0d",
                border:`2px solid ${isActive?C:done?"#2a2a2a":"#181818"}`,
                borderLeft: inGroup
                  ? `4px solid ${groupActive?C:done?"#2a2a2a":"#333"}`
                  : `4px solid ${done?"#2a2a2a":isActive?C:"#252525"}`,
                borderRadius: inGroup
                  ? (isGroupStart?"14px 14px 4px 4px":isGroupEnd?"4px 4px 14px 14px":"4px")
                  : 14,
                opacity:isDragTarget?0.5:1,
                transform:isDragTarget?"scale(0.98)":"scale(1)",
                transition:"all 0.12s",cursor:"pointer",
              }}>

              {/* Exercise row header */}
              <div onClick={()=>selectEx(ex.id)}
                style={{padding:"10px 12px",display:"flex",alignItems:"center",gap:8}}>
                {/* Move up/down buttons */}
                <div style={{display:"flex",flexDirection:"column",gap:1,flexShrink:0}}
                  onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>moveExMidSession(exIdx,exIdx-1)} disabled={exIdx===0}
                    style={{width:22,height:18,borderRadius:4,border:"none",
                      background:exIdx===0?"transparent":"#1a1a1a",
                      color:exIdx===0?"#1a1a1a":"#555",cursor:exIdx===0?"default":"pointer",
                      fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>▲</button>
                  <button onClick={()=>moveExMidSession(exIdx,exIdx+1)} disabled={exIdx===exercises.length-1}
                    style={{width:22,height:18,borderRadius:4,border:"none",
                      background:exIdx===exercises.length-1?"transparent":"#1a1a1a",
                      color:exIdx===exercises.length-1?"#1a1a1a":"#555",
                      cursor:exIdx===exercises.length-1?"default":"pointer",
                      fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>▼</button>
                </div>

                {/* Status badge */}
                <div style={{width:28,height:28,borderRadius:"50%",flexShrink:0,
                  background:done?"#A8FF3E":isActive?`${C}22`:"#141414",
                  border:`2px solid ${done?"#A8FF3E":isActive?C:"#2a2a2a"}`,
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>
                  {done?"✓":isActive?<div style={{width:8,height:8,borderRadius:"50%",background:C}}/>:""}
                </div>

                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,
                    color:done?"#444":isActive?"#F0F0F0":"#888",letterSpacing:1,lineHeight:1,
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ex.name}</div>
                  <div style={{color:"#383838",fontSize:11,marginTop:2}}>
                    {ex.sets} sets · {ex.reps} reps
                    {loggedSets.length>0&&<span style={{color:done?"#A8FF3E44":C+"88"}}> · {loggedSets.length}/{ex.sets} done</span>}
                  </div>
                  {(()=>{
                    const rec=calcRecommended(ex);
                    if(!rec||done) return null;
                    const dispRec=wtDisplay(rec.kg,useKg);
                    const dispLast=wtDisplay(rec.lastKg,useKg);
                    const progVal=ex.progression?.value;
                    const progType=ex.progression?.type||"fixed";
                    return (
                      <div style={{marginTop:5,padding:"5px 8px",background:`${C}0d`,
                        border:`1px solid ${C}33`,borderRadius:7,
                        display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontSize:12}}>📈</span>
                        <span style={{color:C,fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:1}}>{dispRec}</span>
                        <span style={{color:"#3a3a3a",fontSize:10}}>
                          {progType==="pct"?`+${progVal}%`:`+${progVal} ${useKg?"kg":"lbs"}`} from {dispLast}
                          {rec.lastRpe>0&&<span style={{color:"#555"}}> · RPE {rec.lastRpe}</span>}
                        </span>
                      </div>
                    );
                  })()}
                  {ex.setup&&isActive&&(
                    <div style={{marginTop:5,padding:"5px 9px",background:"#111",
                      border:`1px solid ${C}22`,borderRadius:7,
                      color:"#666",fontSize:11,lineHeight:1.5,
                      borderLeft:`3px solid ${C}55`}}>
                      🔧 {ex.setup}
                    </div>
                  )}
                  {/* Per-exercise note */}
                  {isActive&&(
                    <div style={{marginTop:5}} onClick={e=>e.stopPropagation()}>
                      <TouchTextInput
                        value={exerciseNotes[ex.id]||""}
                        onChange={v=>{setExerciseNotes(n=>({...n,[ex.id]:v}));}}
                        placeholder="Add note... e.g. felt tight, moved grip in"
                        color={`${C}88`} multiline={false}/>
                    </div>
                  )}
                  {!isActive&&exerciseNotes[ex.id]&&(
                    <div style={{marginTop:4,padding:"4px 8px",background:"#0d0d0d",
                      border:`1px solid #1e1e1e`,borderRadius:6,
                      color:"#555",fontSize:10,lineHeight:1.4,fontStyle:"italic"}}>
                      📝 {exerciseNotes[ex.id]}
                    </div>
                  )}
                  {isActive&&!done&&(
                    <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap",alignItems:"center"}}>
                      {/* Set count adjuster */}
                      <div style={{display:"flex",alignItems:"center",gap:2,background:"#141414",
                        border:"1px solid #252525",borderRadius:7,padding:"2px 4px"}}
                        onClick={e=>e.stopPropagation()}>
                        <button onClick={()=>{
                          const minSets = Math.max(1, loggedSets.length); // can't go below already logged
                          if(ex.sets <= minSets) return;
                          setExercises(prev=>prev.map(x=>x.id===ex.id?{...x,sets:x.sets-1}:x));
                        }} style={{width:24,height:24,borderRadius:5,border:"none",
                          background:ex.sets<=Math.max(1,loggedSets.length)?"transparent":"#1a1a1a",
                          color:ex.sets<=Math.max(1,loggedSets.length)?"#1a1a1a":"#888",
                          cursor:ex.sets<=Math.max(1,loggedSets.length)?"default":"pointer",
                          fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>−</button>
                        <div style={{color:"#666",fontSize:10,fontFamily:"'Barlow Condensed',sans-serif",
                          letterSpacing:1,minWidth:40,textAlign:"center"}}>{loggedSets.length}/{ex.sets} SETS</div>
                        <button onClick={()=>{
                          setExercises(prev=>prev.map(x=>x.id===ex.id?{...x,sets:x.sets+1}:x));
                        }} style={{width:24,height:24,borderRadius:5,border:"none",
                          background:"#1a1a1a",color:"#888",cursor:"pointer",
                          fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>+</button>
                      </div>
                      <button onClick={e=>{e.stopPropagation();skipExercise(ex.id);}}
                        style={{background:"#1a1a0a",border:"1px solid #3a3a1a",borderRadius:7,
                          color:"#888",padding:"4px 10px",cursor:"pointer",fontSize:10,
                          fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>⏭ SKIP</button>
                      <button onClick={e=>{e.stopPropagation();removeExerciseMidSession(ex.id);}}
                        style={{background:"#1a0a0a",border:"1px solid #3a1a1a",borderRadius:7,
                          color:"#884444",padding:"4px 10px",cursor:"pointer",fontSize:10,
                          fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>🗑 REMOVE</button>
                    </div>
                  )}
                </div>

                {/* Logged set chips — tap to edit */}
                {loggedSets.length>0&&(
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end",maxWidth:140}}>
                    {loggedSets.map((s,i)=>{
                      const isEditing=editingSet?.exId===ex.id&&editingSet?.si===i;
                      return (
                        <button key={i} onClick={e=>{e.stopPropagation();editSet(ex.id,i);}}
                          style={{background:isEditing?`${C}33`:done?"#1a1a1a":isActive?`${C}18`:"#141414",
                            border:`1px solid ${isEditing?C:done?"#333":isActive?C+"44":"#222"}`,
                            borderRadius:6,padding:"3px 8px",fontSize:10,whiteSpace:"nowrap",
                            cursor:"pointer",color:"inherit",display:"flex",alignItems:"center",gap:4}}>
                          <span style={{color:isEditing?"#fff":done?"#444":C,fontWeight:700}}>{wtDisplay(s.weight,useKg)}</span>
                          <span style={{color:"#333"}}>×{s.reps}</span>
                          <span style={{color:"#2a2a2a",fontSize:9}}>✎</span>
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>

              {/* Active exercise — show set input or edit inline */}
              {isActive&&!done&&(
                <div style={{borderTop:`1px solid ${C}22`,padding:"12px 14px"}}>
                  {editingSet?.exId===ex.id ? (
                    <EditSetInput
                      color={C} useKg={useKg}
                      set={loggedSets[editingSet.si]}
                      setNum={editingSet.si+1}
                      onSave={d=>saveEditedSet(ex.id,editingSet.si,d)}
                      onDelete={()=>deleteSet(ex.id,editingSet.si)}
                      onCancel={()=>setEditingSet(null)}
                    />
                  ) : (
                    <SetInput key={loggedSets.length} color={C} setNum={loggedSets.length+1} totalSets={ex.sets} ex={ex}
                      prevSet={loggedSets[loggedSets.length-1]}
                      recWeight={loggedSets.length===0 ? (calcRecommended(ex)?.kg ?? getPersonalBestData(ex.name)?.weight ?? null) : null}
                      lastReps={loggedSets.length===0 ? getLastWorkoutData(ex.name)?.reps : null}
                      onLog={logSet}
                      useKg={useKg} onToggleUnit={()=>setUseKg(k=>!k)}/>
                  )}
                </div>
              )}
              {/* Edit set for completed active exercise */}
              {isActive&&done&&editingSet?.exId===ex.id&&(
                <div style={{borderTop:`1px solid ${C}22`,padding:"12px 14px"}}>
                  <EditSetInput
                    color={C} useKg={useKg}
                    set={loggedSets[editingSet.si]}
                    setNum={editingSet.si+1}
                    onSave={d=>saveEditedSet(ex.id,editingSet.si,d)}
                    onDelete={()=>deleteSet(ex.id,editingSet.si)}
                    onCancel={()=>setEditingSet(null)}
                  />
                </div>
              )}
              {/* Add extra set beyond programmed count */}
              {isActive&&done&&!editingSet&&(
                <div style={{borderTop:`1px solid ${C}22`,padding:"10px 14px",display:"flex",flexDirection:"column",gap:8}}>
                  {ex._addingExtra ? (
                    <SetInput key={loggedSets.length} color={C} setNum={loggedSets.length+1} totalSets={loggedSets.length+1} ex={ex}
                      prevSet={loggedSets[loggedSets.length-1]}
                      recWeight={null}
                      lastReps={null}
                      onLog={logSet}
                      useKg={useKg} onToggleUnit={()=>setUseKg(k=>!k)}/>
                  ) : (
                    <button onClick={e=>{e.stopPropagation();setExercises(prev=>prev.map(x=>x.id===ex.id?{...x,_addingExtra:true}:x));}}
                      style={{width:"100%",background:`${C}0a`,border:`1px dashed ${C}44`,borderRadius:10,
                        padding:"10px",cursor:"pointer",color:C,fontSize:11,
                        fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2,fontWeight:700,
                        transition:"all 0.15s"}}>
                      + ADD EXTRA SET ({loggedSets.length}/{ex.sets} done)
                    </button>
                  )}
                </div>
              )}
              {/* Edit modal for non-active exercises */}
              {!isActive&&editingSet?.exId===ex.id&&(
                <div style={{borderTop:`1px solid ${C}22`,padding:"12px 14px"}}>
                  <EditSetInput
                    color={C} useKg={useKg}
                    set={loggedSets[editingSet.si]}
                    setNum={editingSet.si+1}
                    onSave={d=>saveEditedSet(ex.id,editingSet.si,d)}
                    onDelete={()=>deleteSet(ex.id,editingSet.si)}
                    onCancel={()=>setEditingSet(null)}
                  />
                </div>
              )}
              {/* Mid-session superset controls */}
              {isActive&&(
                <div style={{padding:"4px 14px 8px",display:"flex",gap:4,flexWrap:"wrap"}}>
                  {exIdx>0 && !ex.groupId && !exercises[exIdx-1]?.groupId && (
                    <button onClick={e=>{e.stopPropagation();
                      const above=exercises[exIdx-1];
                      const gid=mkId();
                      setExercises(prev=>prev.map(x=>
                        x.id===above.id?{...x,groupId:gid}:
                        x.id===ex.id?{...x,groupId:gid}:x));
                    }} style={{background:"#0d0d0d",border:`1px dashed ${C}44`,borderRadius:7,
                      color:`${C}88`,padding:"3px 8px",cursor:"pointer",fontSize:9,
                      fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>
                      🔗 SUPERSET WITH ABOVE
                    </button>
                  )}
                  {exIdx>0 && !ex.groupId && exercises[exIdx-1]?.groupId && (
                    <button onClick={e=>{e.stopPropagation();
                      const gid=exercises[exIdx-1].groupId;
                      const label=exercises[exIdx-1].groupLabel||"";
                      setExercises(prev=>prev.map(x=>x.id===ex.id?{...x,groupId:gid,groupLabel:label}:x));
                    }} style={{background:`${C}12`,border:`1px solid ${C}44`,borderRadius:7,
                      color:C,padding:"3px 8px",cursor:"pointer",fontSize:9,
                      fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>
                      🔗 JOIN "{exercises[exIdx-1].groupLabel||"SUPERSET"}"
                    </button>
                  )}
                  {/* Show all available supersets to join */}
                  {!ex.groupId && (()=>{
                    const groups={};
                    exercises.forEach(e=>{if(e.groupId && e.id!==ex.id){
                      if(!groups[e.groupId]) groups[e.groupId]={label:e.groupLabel||"Superset",gid:e.groupId};
                    }});
                    const uniqueGroups=Object.values(groups);
                    // Only show if there are groups beyond the adjacent one
                    const adjacentGid=exercises[exIdx-1]?.groupId;
                    const otherGroups=uniqueGroups.filter(g=>g.gid!==adjacentGid);
                    return otherGroups.map(g=>(
                      <button key={g.gid} onClick={e=>{e.stopPropagation();
                        setExercises(prev=>prev.map(x=>x.id===ex.id?{...x,groupId:g.gid,groupLabel:g.label}:x));
                      }} style={{background:"#0d0d0d",border:`1px dashed ${C}33`,borderRadius:7,
                        color:`${C}66`,padding:"3px 8px",cursor:"pointer",fontSize:9,
                        fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>
                        🔗 JOIN "{g.label}"
                      </button>
                    ));
                  })()}
                  {inGroup && (
                    <button onClick={e=>{e.stopPropagation();
                      const gid=ex.groupId;
                      setExercises(prev=>{
                        const updated=prev.map(x=>x.id===ex.id?{...x,groupId:null,groupLabel:null}:x);
                        // If only 1 left in group, unlink that too
                        const remaining=updated.filter(x=>x.groupId===gid);
                        if(remaining.length===1) return updated.map(x=>x.groupId===gid?{...x,groupId:null,groupLabel:null}:x);
                        return updated;
                      });
                    }} style={{background:"#1a0a0a",border:"1px solid #3a1a1a",borderRadius:7,
                      color:"#884444",padding:"3px 8px",cursor:"pointer",fontSize:9,
                      fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>
                      UNLINK
                    </button>
                  )}
                </div>
              )}
            </div>
            {/* Insert exercise after this one */}
            <button onClick={e=>{e.stopPropagation();setInsertAtIdx(exIdx);setShowAddExModal(true);}}
              style={{width:"100%",background:"none",border:"1px dashed #1e1e1e",borderRadius:8,
                color:"#252525",padding:"3px",cursor:"pointer",fontSize:8,margin:"3px 0",
                fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2,
                transition:"all 0.15s"}}
              onPointerEnter={e=>{e.currentTarget.style.borderColor=C;e.currentTarget.style.color=C;}}
              onPointerLeave={e=>{e.currentTarget.style.borderColor="#1e1e1e";e.currentTarget.style.color="#252525";}}>
              + INSERT
            </button>
            </div>
          );
        })}

        {/* Finish button when all done */}
        <button onClick={()=>{setInsertAtIdx(null);setShowAddExModal(true);}}
          style={{background:"none",border:`1px dashed ${C}33`,borderRadius:12,
            color:`${C}66`,padding:"12px",cursor:"pointer",fontSize:12,
            fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2,width:"100%"}}>
          + ADD EXERCISE
        </button>
        {anyLogged&&(
          <Btn full label={exercises.every(isExDone)?"FINISH WORKOUT 🏆":"FINISH WORKOUT ✓"} bg={C} color="#000" onClick={finish}/>
        )}
      </div>
    </div>
  );
}



// ─── Plate Calculator ─────────────────────────────────────────────────────────
function calcPlates(targetLbs, barbellLbs=45) {
  const plates = [45,35,25,10,5,2.5,0.5];
  let remaining = (targetLbs - barbellLbs) / 2;
  if(remaining <= 0) return [];
  const result = [];
  for(const p of plates){
    const count = Math.floor(remaining / p);
    if(count > 0){ result.push({weight:p, count}); remaining -= count * p; }
  }
  return result;
}

function PlateCalculator({ weightKg, useKg, color, onClose }) {
  const BARBELL_OPTIONS_LBS = [45, 35, 25, 15];
  const BARBELL_OPTIONS_KG  = [20, 15, 10, 7.5];

  const [barbellIdx, setBarbellIdx] = useState(0);
  const barbellWt = barbellOpts[barbellIdx];

  // weightKg is always stored in kg — convert to lbs for plate calculation
  const targetLbs = parseFloat((parseFloat(weightKg)*2.20462).toFixed(1))||0;
  const barbellLbs = useKg
    ? parseFloat((barbellWt*2.20462).toFixed(1))
    : barbellWt;

  const plateList = calcPlates(targetLbs, barbellLbs);
  const PLATE_COLORS = {45:"#FF6B35",35:"#00D4FF",25:"#A8FF3E",10:"#888",5:"#aaa",2.5:"#555",0.5:"#444"};

  const totalCheck = barbellLbs + plateList.reduce((a,p)=>a+p.weight*p.count*2, 0);

  return ReactDOM.createPortal(
    <div style={{position:"fixed",inset:0,zIndex:9600,display:"flex",flexDirection:"column",
      justifyContent:"flex-end"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#111",borderTop:`3px solid ${color}`,borderRadius:"24px 24px 0 0",
        padding:"18px 18px 32px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color,letterSpacing:3}}>
            PLATE CALCULATOR
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#555",
            fontSize:20,cursor:"pointer",padding:"4px 8px"}}>✕</button>
        </div>

        {/* Target weight display */}
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:52,color,lineHeight:1,letterSpacing:2}}>
            {useKg ? `${weightKg} kg` : `${targetLbs} lbs`}
          </div>
          <div style={{color:"#333",fontSize:11,marginTop:4}}>
            = {useKg ? `${targetLbs} lbs` : `${parseFloat((targetLbs/2.20462).toFixed(1))} kg`}
          </div>
        </div>

        {/* Barbell selector */}
        <div style={{marginBottom:16}}>
          <div style={{color:"#444",fontSize:10,letterSpacing:3,marginBottom:8,

          <div style={{display:"flex",gap:8}}>
            {barbellOpts.map((w,i)=>(
              <button key={w} onClick={()=>setBarbellIdx(i)} style={{
                flex:1,height:44,borderRadius:10,cursor:"pointer",
                border:`2px solid ${i===barbellIdx?color:"#252525"}`,
                background:i===barbellIdx?`${color}22`:"#1a1a1a",
                color:i===barbellIdx?color:"#555",
                fontFamily:"'Bebas Neue',sans-serif",fontSize:16,letterSpacing:1}}>
                {w}{useKg?"kg":"lb"}
              </button>
            ))}
          </div>
        </div>

        {/* Plate visual */}
        {plateList.length > 0 ? (
          <div>
            <div style={{color:"#444",fontSize:10,letterSpacing:3,marginBottom:10,
              fontFamily:"'Barlow Condensed',sans-serif"}}>LOAD EACH SIDE</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
              {plateList.map(p=>(
                <div key={p.weight} style={{display:"flex",alignItems:"center",gap:12}}>
                  {/* Plate visual */}
                  <div style={{display:"flex",gap:4}}>
                    {Array.from({length:p.count}).map((_,i)=>(
                      <div key={i} style={{
                        width:18, height:36, borderRadius:4,
                        background:PLATE_COLORS[p.weight]||"#666",
                        border:`2px solid ${PLATE_COLORS[p.weight]||"#666"}`,
                        opacity:0.85
                      }}/>
                    ))}
                  </div>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,
                    color:PLATE_COLORS[p.weight]||"#888",letterSpacing:1}}>

  const initWt = prevSet?.weight ? toDisplayVal(prevSet.weight, useKg)
               : recWeight ? toDisplayVal(recWeight, useKg)
               : "";
  const initRp = prevSet?.reps ? String(prevSet.reps)
               : lastReps ? String(lastReps)
               : "";
  const [wt,setWt]=useState(initWt);
  const [rp,setRp]=useState(initRp);
  const [rpe,setRpe]=useState(0);
  const [showPlates,setShowPlates]=useState(false);

  function submit(){
    // Convert entered weight to kg for storage
    const rawWt = wt || "";
    const storedWt = rawWt === "" ? (prevSet?.weight || "BW") : toStoredKg(rawWt, useKg);
    onLog({weight: storedWt, reps: rp||ex.reps, rpe});
    setWt(""); setRp(""); setRpe(0);

  const rpeLabel=rpe===0?"":rpe<=3?"Easy":rpe<=5?"Moderate":rpe<=7?"Hard":rpe<=8?"Very Hard":rpe===9?"Max−1":"Max Effort";
  const rpeColor=rpe===0?"#333":rpe<=4?`${color}55`:rpe<=7?`${color}99`:color;

    <div style={{background:`${color}0c`,border:`2px solid ${color}2a`,borderRadius:18,padding:"16px 16px"}}>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div style={{color:"#555",fontSize:10,letterSpacing:3,fontFamily:"'Barlow Condensed',sans-serif"}}>WEIGHT</div>
          {(parseFloat(wt)||parseFloat(toDisplayVal(prevSet?.weight||recWeight,useKg)))>0&&(
            <button onClick={()=>setShowPlates(true)} style={{background:"none",border:"1px solid #252525",
              borderRadius:7,color:"#555",padding:"4px 10px",cursor:"pointer",fontSize:10,
              fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>🏋️ PLATES</button>

        {showPlates&&<PlateCalculator

      </div>

      <div style={{marginBottom:14}}>
        <div style={{color:"#555",fontSize:10,letterSpacing:3,marginBottom:8,fontFamily:"'Barlow Condensed',sans-serif"}}>REPS</div>

        {/* Quick rep buttons */}
        <div style={{display:"flex",gap:6,marginTop:8}}>
          {lastReps&&!prevSet&&(()=>{
            const lr=String(lastReps);
            const isActive=String(rp)===lr;
            return (
              <button onClick={()=>setRp(lr)} style={{
                flex:1.2,height:38,borderRadius:10,cursor:"pointer",
                border:`2px solid ${isActive?color:"#252525"}`,
                background:isActive?`${color}33`:"#0f1f0f",
                color:isActive?color:"#7ddd7d",
                fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,letterSpacing:1,
                transition:"all 0.1s",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                <span style={{fontSize:11}}>↩</span> {lr}
              </button>
            );
          })()}
          {prevSet?.reps&&(()=>{
            const pr=String(prevSet.reps);
            const isActive=String(rp)===pr;
            const isDuplicate=[5,8,10].map(String).includes(pr);
            if(isDuplicate) return null;
            return (
              <button onClick={()=>setRp(pr)} style={{
                flex:1.2,height:38,borderRadius:10,cursor:"pointer",
                border:`2px solid ${isActive?color:"#252525"}`,
                background:isActive?`${color}33`:"#0f1a1f",
                color:isActive?color:"#7daadd",

                transition:"all 0.1s",display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                <span style={{fontSize:11}}>↩</span> {pr}

            );
          })()}
          {[5,8,10].map(n=>{
            const isActive=String(rp)===String(n);
            return (
              <button key={n} onClick={()=>setRp(String(n))} style={{
                flex:1,height:38,borderRadius:10,cursor:"pointer",
                border:`2px solid ${isActive?color:"#252525"}`,
                background:isActive?`${color}33`:"#1a1a1a",
                color:isActive?color:"#888",
                fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:1,
                transition:"all 0.1s"}}>
                {n}

          })}
