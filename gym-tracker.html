// PROGRAM EDITOR
// ══════════════════════════════════════════════════════════════════════════════
function ProgramEditor({ user, program, onSave, onBack }) {
  const [prog,setProg]=useState(()=>program?JSON.parse(JSON.stringify(program)):
    {id:mkId(),name:"New Program",weeks:8,days:[]});
  const [open,setOpen]=useState(null); // expanded day id
  const C=user.color;

  const up=patch=>setProg(p=>({...p,...patch}));
  const addDay=()=>{const d={id:mkId(),days:["Monday"],label:"New Day",exercises:[],scheduleType:"days",timesPerWeek:3,defaultMode:"traditional"};setProg(p=>({...p,days:[...p.days,d]}));setOpen(d.id);};
  const delDay=id=>setProg(p=>({...p,days:p.days.filter(d=>d.id!==id)}));
  const upDay=(id,patch)=>setProg(p=>({...p,days:p.days.map(d=>d.id===id?{...d,...patch}:d)}));
  const addEx=did=>{const e={id:mkId(),name:"New Exercise",sets:3,reps:"10",rest:60,setup:"",groupId:null,progression:{type:"fixed",value:0}};
    setProg(p=>({...p,days:p.days.map(d=>d.id===did?{...d,exercises:[...d.exercises,e]}:d)}));};
  const delEx=(did,eid)=>setProg(p=>({...p,days:p.days.map(d=>d.id===did?{...d,exercises:d.exercises.filter(e=>e.id!==eid)}:d)}));
  const upEx=(did,eid,patch)=>setProg(p=>({...p,days:p.days.map(d=>d.id===did?
    {...d,exercises:d.exercises.map(e=>e.id===eid?{...e,...patch}:e)}:d)}));

  return (
    <div style={{minHeight:"100vh",background:"#080808"}}>
      {/* Sticky header */}
      <div style={{position:"sticky",top:0,zIndex:20,background:"#0d0d0d",
        borderBottom:`3px solid ${C}`,padding:"16px 28px",
        display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <Btn label="← BACK" size="sm" bg="transparent" color="#555" border="#1e1e1e" onClick={onBack}/>
          <div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,color:C,letterSpacing:3}}>{user.name}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"#F0F0F0",letterSpacing:3,lineHeight:1}}>PROGRAM EDITOR</div>
          </div>
        </div>
        <Btn label="SAVE" icon="💾" bg={C} color="#000" onClick={()=>onSave(prog)}/>
      </div>

      <div style={{padding:"24px 28px",display:"flex",flexDirection:"column",gap:20}}>
        {/* Program meta */}
        <div style={{background:"#0d0d0d",border:"1px solid #1a1a1a",borderRadius:18,padding:"22px 24px"}}>
          <div style={{color:"#333",fontSize:11,letterSpacing:3,marginBottom:16,fontFamily:"'Barlow Condensed',sans-serif"}}>PROGRAM DETAILS</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:20,alignItems:"end"}}>
            <TouchTextInput label="PROGRAM NAME" value={prog.name} onChange={v=>up({name:v})} placeholder="e.g. Push Pull Legs" color={C}/>
            <div>
              <div style={{color:"#555",fontSize:11,letterSpacing:3,marginBottom:8,fontFamily:"'Barlow Condensed',sans-serif"}}>WEEKS</div>
              <Stepper value={prog.weeks} onChange={v=>up({weeks:v})} min={1} color={C}/>
            </div>
          </div>
        </div>

        {/* Days */}
        {prog.days.map(day=>(
          <div key={day.id} style={{background:"#0d0d0d",
            border:`2px solid ${open===day.id?C:"#1a1a1a"}`,borderRadius:18,overflow:"hidden",transition:"border 0.2s"}}>
            {/* Day header */}
            <div style={{padding:"18px 22px",display:"flex",alignItems:"center",gap:16,
              cursor:"pointer",background:open===day.id?`${C}0a`:"transparent"}}
              onClick={()=>setOpen(open===day.id?null:day.id)}>

                            </button>

    const next = selected.includes(d) ? selected.filter(x=>x!==d) : [...selected, d];

  return (
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      {DOW.map(d => {
        const on = selected.includes(d);
        return (
          <button key={d} onClick={()=>toggle(d)} style={{
            padding:"10px 0", minWidth:52, borderRadius:11, cursor:"pointer",

}

function SvgLineChart({ data, color, width=600, height=180, yLabel="", showDots=true, formatY=v=>v, formatX=v=>v }) {
  if(!data||data.length<2) return (
    <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#2a2a2a",
      fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:3}}>NOT ENOUGH DATA YET</div>
  );
  const pad={t:16,r:16,b:36,l:52};
  const W=width-pad.l-pad.r, H=height-pad.t-pad.b;
  const vals=data.map(d=>d.y);
  const xVals=data.map((_,i)=>i);
  const minY=Math.min(...vals), maxY=Math.max(...vals);
  const rangeY=maxY-minY||1;
  const px=i=>pad.l + (i/(data.length-1))*W;
  const py=v=>pad.t + H - ((v-minY)/rangeY)*H;
  const pathD=data.map((d,i)=>`${i===0?"M":"L"}${px(i).toFixed(1)},${py(d.y).toFixed(1)}`).join(" ");
  const areaD=pathD+` L${px(data.length-1).toFixed(1)},${(pad.t+H).toFixed(1)} L${px(0).toFixed(1)},${(pad.t+H).toFixed(1)} Z`;
  // Y grid lines (4)
  const yTicks=[0,0.25,0.5,0.75,1].map(t=>minY+t*rangeY);
  // X ticks: max 8 labels
  const step=Math.max(1,Math.ceil(data.length/8));
  const xTicks=data.map((_,i)=>i).filter(i=>i%step===0||(i===data.length-1));
  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{overflow:"visible"}}>
      <defs>
        <linearGradient id={`grad-${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      {/* Grid */}
      {yTicks.map((v,i)=>(
        <g key={i}>
          <line x1={pad.l} x2={pad.l+W} y1={py(v)} y2={py(v)} stroke="#1e1e1e" strokeWidth="1"/>
          <text x={pad.l-6} y={py(v)+4} textAnchor="end" fontSize="10" fill="#383838" fontFamily="Barlow Condensed">{formatY(Math.round(v))}</text>
        </g>
      ))}
      {/* Area fill */}
      <path d={areaD} fill={`url(#grad-${color.replace("#","")})`}/>
      {/* Line */}
      <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {/* Dots */}
      {showDots&&data.map((d,i)=>(
        <circle key={i} cx={px(i)} cy={py(d.y)} r="4" fill={color} stroke="#0d0d0d" strokeWidth="2"/>
      ))}
      {/* X labels */}
      {xTicks.map(i=>(
        <text key={i} x={px(i)} y={pad.t+H+20} textAnchor="middle" fontSize="10" fill="#444" fontFamily="Barlow Condensed">{formatX(data[i].x)}</text>
      ))}
      {/* Y axis line */}
      <line x1={pad.l} x2={pad.l} y1={pad.t} y2={pad.t+H} stroke="#252525" strokeWidth="1"/>
    </svg>
  );
}

function SvgBarChart({ data, color, width=600, height=180, formatY=v=>v, formatX=v=>v }) {
  if(!data||data.length===0) return (
    <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#2a2a2a",
      fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:3}}>NO DATA YET</div>
  );
  const pad={t:16,r:16,b:36,l:60};
  const W=width-pad.l-pad.r, H=height-pad.t-pad.b;
  const vals=data.map(d=>d.y);
  const maxY=Math.max(...vals,1);
  const barW=Math.max(4, W/data.length*0.7);
  const gap=W/data.length;
  const py=v=>pad.t + H - (v/maxY)*H;
  const yTicks=[0,0.25,0.5,0.75,1].map(t=>Math.round(t*maxY));
  const step=Math.max(1,Math.ceil(data.length/8));
  const xTicks=data.map((_,i)=>i).filter(i=>i%step===0||(i===data.length-1));
  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} style={{overflow:"visible"}}>
      {yTicks.map((v,i)=>(
        <g key={i}>
          <line x1={pad.l} x2={pad.l+W} y1={py(v)} y2={py(v)} stroke="#1e1e1e" strokeWidth="1"/>
          <text x={pad.l-6} y={py(v)+4} textAnchor="end" fontSize="10" fill="#383838" fontFamily="Barlow Condensed">{formatY(v)}</text>
        </g>
      ))}
      {data.map((d,i)=>{
        const x=pad.l+i*gap+(gap-barW)/2;
        const barH=(d.y/maxY)*H;
        const isRecent=i>=data.length-3;
        return (
          <g key={i}>
            <rect x={x} y={py(d.y)} width={barW} height={Math.max(1,barH)}
              fill={isRecent?color:`${color}55`} rx="3"/>
          </g>
        );
      })}
      {xTicks.map(i=>(
        <text key={i} x={pad.l+i*gap+gap/2} y={pad.t+H+20} textAnchor="middle" fontSize="10" fill="#444" fontFamily="Barlow Condensed">{formatX(data[i].x)}</text>
      ))}
      <line x1={pad.l} x2={pad.l} y1={pad.t} y2={pad.t+H} stroke="#252525" strokeWidth="1"/>
    </svg>
  );
}

// Build volume-over-time data grouped by period
function buildVolumeData(history, period, useImperial) {
  const buckets={};
  Object.entries(history).forEach(([date,sess])=>{
    const dt=new Date(date+"T12:00:00");
    let key;
    if(period==="day"){
      key=date; // already YYYY-MM-DD
    } else if(period==="week"){
      // ISO week key
      const d=new Date(dt); d.setHours(0,0,0,0);
      d.setDate(d.getDate()-d.getDay()+1); // Monday
      key=d.toISOString().split("T")[0];
    } else if(period==="month"){
      key=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}`;
    } else {
      key=String(dt.getFullYear());
    }
    const vol=Object.values(sess.namedLog||{}).flat().filter(Boolean)
      .reduce((a,s)=>a+(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0),0);
    buckets[key]=(buckets[key]||0)+(useImperial?vol*2.20462:vol);
  });
  return Object.entries(buckets).sort(([a],[b])=>a.localeCompare(b))
    .map(([k,v])=>({x:k,y:Math.round(v)}));
}

function formatVolKey(k, period) {
  if(period==="year") return k;
  if(period==="day"){
    const d=new Date(k+"T12:00:00");
    return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  }
  if(period==="month"){
    const [y,m]=k.split("-");
    return ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][parseInt(m)]+" "+y.slice(2);
  }
  // week: YYYY-MM-DD → "Jan 5"
  const d=new Date(k+"T12:00:00");
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}

function formatVol(v, useImperial) {
  if(v>=1000000) return (v/1000000).toFixed(1)+"M";
  if(v>=1000) return (v/1000).toFixed(1)+"k";
  return String(v);
}

                    <div style={{display:"flex",gap:12,marginTop:14,flexWrap:"wrap"}}>
                      {[
                        {v:`${last} ${weightUnit}`,l:"LATEST"},
                        {v:`${peak} ${weightUnit}`,l:"PEAK"},
                        {v:`${gain>=0?"+":""}${gain.toFixed(1)} ${weightUnit}`,l:"TOTAL GAIN",c:gain>=0?"#A8FF3E":"#FF4444"},
                        gainPct&&{v:`${gain>=0?"+":""}${gainPct}%`,l:"% CHANGE",c:gain>=0?"#A8FF3E":"#FF4444"},
                        {v:exData.length,l:"SESSIONS"},
                      ].filter(Boolean).map((s,i)=>(
                        <div key={i} style={{background:"#141414",border:"1px solid #1e1e1e",borderRadius:12,padding:"10px 14px",flex:1,minWidth:80}}>

              </div>
            )}

        )}

    </div>
  );
}

function buildExerciseHistory(history) {
  // Returns { "Exercise Name": [ {date, sets:[{weight,reps,rpe}], best:{weight,reps}, vol} ] }
  const map = {};
  Object.entries(history).sort(([a],[b])=>a.localeCompare(b)).forEach(([key,sess]) => {
    const date = sess?.date||dateOf(key);
    if(!sess) return;
    const named = sess.namedLog || {};
    Object.entries(named).forEach(([name, sets]) => {
      if(!map[name]) map[name] = [];
      const numSets = (sets||[]).filter(s=>s&&s.reps);
      if(!numSets.length) return;
      const best = numSets.reduce((b,s) => {
        const w = parseFloat(s.weight)||0;
        return w > (parseFloat(b.weight)||0) ? s : b;
      }, numSets[0]);
      const vol = numSets.reduce((a,s)=>{
        const w=parseFloat(s.weight)||0, r=parseFloat(s.reps)||0;
        return a + w*r;
      },0);
      map[name].push({date, sets:numSets, best, vol});
    });
  });
  return map;
}

function BiometricLogModal({ user, onSave, onClose }) {
  const bio = user.biometrics||{};
  const useKg = bio.units!=="us";
  const todayIso = new Date().toISOString().split("T")[0];
  const [entryDate, setEntryDate] = useState(todayIso);
  // Pre-fill from the selected date's entry, or most recent, or current biometrics
  const sortedHist = (user.biometricHistory||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const lastEntry = sortedHist[0];
  const initW = lastEntry?.weightKg||bio.weightKg||"";
  const initBf = lastEntry?.bodyFatPct||bio.bodyFatPct||"";
  const [wt, setWt] = useState(initW?String(useKg?initW:parseFloat((parseFloat(initW)*2.20462).toFixed(1))):"");
  const [bf, setBf] = useState(initBf?String(initBf):"");
  const C = user.color;

  // When date changes, pre-fill from that date's existing entry if it exists
  function handleDateChange(d) {
    setEntryDate(d);
    const existing = (user.biometricHistory||[]).find(e=>e.date===d);
    if(existing) {
      if(existing.weightKg) setWt(String(useKg?existing.weightKg:parseFloat((parseFloat(existing.weightKg)*2.20462).toFixed(1))));
      if(existing.bodyFatPct) setBf(String(existing.bodyFatPct));
    }
  }

  const isToday = entryDate===todayIso;
  const dateLabel = isToday?"Today":new Date(entryDate+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});

  function save(){
    const kg = wt ? (useKg?parseFloat(wt):parseFloat((parseFloat(wt)/2.20462).toFixed(2))) : null;
    const bfVal = parseFloat(bf)||null;
    onSave({date:entryDate, weightKg:kg||null, bodyFatPct:bfVal});
  }

  const kg = wt?(useKg?parseFloat(wt):parseFloat((parseFloat(wt)/2.20462).toFixed(2))):null;
  const leanMass = kg&&bf?parseFloat((kg*(1-parseFloat(bf)/100)).toFixed(1)):null;
  const fatMass  = kg&&bf?parseFloat((kg*parseFloat(bf)/100).toFixed(1)):null;
  const bmrPreview = kg?calcBMR({...bio,weightKg:kg,bodyFatPct:parseFloat(bf)||bio.bodyFatPct}):null;

  return (
    <Modal title="LOG BODY STATS" onClose={onClose} width={460}>
      <div style={{display:"flex",flexDirection:"column",gap:18}}>
        {/* Date selector */}
        <div>
          <div style={{color:"#555",fontSize:11,letterSpacing:3,marginBottom:8,fontFamily:"'Barlow Condensed',sans-serif"}}>DATE</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>{ const d=new Date(entryDate+"T12:00:00"); d.setDate(d.getDate()-1); handleDateChange(d.toISOString().split("T")[0]); }}
              style={{width:44,height:44,borderRadius:11,background:"#1a1a1a",border:`1px solid ${C}33`,
                color:C,fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"#F0F0F0",letterSpacing:1}}>{dateLabel}</div>
              <input type="date" value={entryDate} max={todayIso} onChange={e=>handleDateChange(e.target.value)}
                style={{background:"none",border:"none",color:"#444",fontSize:11,cursor:"pointer",
                  fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1,outline:"none",
                  colorScheme:"dark",marginTop:2}}/>
            </div>
            <button onClick={()=>{ if(entryDate>=todayIso) return; const d=new Date(entryDate+"T12:00:00"); d.setDate(d.getDate()+1); handleDateChange(d.toISOString().split("T")[0]); }}
              style={{width:44,height:44,borderRadius:11,background:"#1a1a1a",border:`1px solid ${C}33`,
                color:entryDate>=todayIso?"#2a2a2a":C,fontSize:22,cursor:entryDate>=todayIso?"default":"pointer",
                display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          </div>
          {(user.biometricHistory||[]).find(e=>e.date===entryDate)&&(
            <div style={{marginTop:6,color:`${C}88`,fontSize:11,textAlign:"center",letterSpacing:1}}>
              ✎ Editing existing entry for this date
            </div>
          )}
        </div>

        <div>
          <div style={{color:"#555",fontSize:11,letterSpacing:3,marginBottom:8,fontFamily:"'Barlow Condensed',sans-serif"}}>
            WEIGHT ({useKg?"kg":"lbs"})
          </div>
          <WeightSpinner value={wt} onChange={setWt} useKg={useKg} color={C}/>
        </div>

        <div>
          <div style={{color:"#555",fontSize:11,letterSpacing:3,marginBottom:8,fontFamily:"'Barlow Condensed',sans-serif"}}>
            BODY FAT % <span style={{color:"#2a2a2a",fontWeight:400}}>— optional</span>
          </div>
          <TouchNumInput label="" value={bf} onChange={setBf} color={C} unit="%" min={1} max={60} step={0.5}/>
        </div>

        {/* Live stats preview */}
        {(leanMass||bmrPreview)&&(
          <div style={{background:"#0d0d0d",border:`1px solid ${C}22`,borderRadius:12,padding:"14px 16px",
            display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>

    weekMap[wk]=(weekMap[wk]||0)+1;
  });
  const thisWeek=sessions.filter(([d])=>{const dt=new Date(d);const ws=new Date();ws.setDate(ws.getDate()-ws.getDay());return dt>=ws;}).length;

    const entries = exHistory[name] || [];
    if(!entries.length) return null;
    return entries.reduce((best, e) => {
      const w = parseFloat(e.best?.weight)||0;
      return w > (parseFloat(best?.weight)||0) ? e.best : best;

    const entries = exHistory[name] || [];

    const entries = exHistory[name] || [];

            {[
              {v:sessions.length,l:"TOTAL SESSIONS",i:"🏆"},
              {v:thisWeek,l:"THIS WEEK",i:"📅"},
              {v:allExerciseNames.length,l:"EXERCISES TRACKED",i:"💪"},
            {v:sessions.slice(0,10).reduce((a,[,s])=>a+(s.calories||0),0)||"—",l:"KCAL (LAST 10)",i:"🔥"},
            ].map(s=>(
              <div key={s.l} style={{background:"#0d0d0d",border:"1px solid #181818",borderRadius:16,padding:"20px 20px"}}>
                <div style={{fontSize:22,marginBottom:6}}>{s.i}</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:48,color:C,lineHeight:1}}>{s.v}</div>
                <div style={{color:"#383838",fontSize:10,letterSpacing:2,marginTop:4}}>{s.l}</div>
              </div>
            ))}
          </div>

          {/* Biometrics card + log button */}
          {(()=>{
            const bio=user.biometrics||{};
            const bmr=bio.weightKg?calcBMR(bio):null;
            const tdeeMulti={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,veryActive:1.9};
            const tdee=bmr?Math.round(bmr*(tdeeMulti[bio.activityLevel]||1.55)):null;
            const totalCals=sessions.reduce((a,[,s])=>a+(s.calories||0),0);
            const bioHist=(user.biometricHistory||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
            const latest=bioHist[0];
            const useKgDisp=bio.units!=="us";
            return (
              <div style={{background:"#0d0d0d",border:`1px solid ${C}22`,borderRadius:16,padding:"18px 20px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:C,letterSpacing:3}}>BODY STATS</div>
                  <button onClick={()=>setShowBioModal(true)}
                    style={{background:`${C}22`,border:`1px solid ${C}55`,borderRadius:9,color:C,
                      padding:"7px 14px",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",
                      fontWeight:700,fontSize:12,letterSpacing:2}}>+ LOG TODAY</button>
                </div>

                {/* Current stats row */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10,marginBottom:14}}>
                  <div style={{background:"#141414",borderRadius:12,padding:"12px 14px"}}>
                    <div style={{color:"#383838",fontSize:10,letterSpacing:2,marginBottom:4}}>CURRENT WEIGHT</div>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"#F0F0F0",lineHeight:1}}>
                      {latest?.weightKg?(useKgDisp?`${latest.weightKg}kg`:`${kgToLbs(latest.weightKg)} lbs`)
                       :bio.weightKg?(useKgDisp?`${bio.weightKg}kg`:`${kgToLbs(bio.weightKg)} lbs`):"—"}
                    </div>
                    {latest?.date&&<div style={{color:"#333",fontSize:10,marginTop:3}}>{new Date(latest.date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>}
                  </div>
                  <div style={{background:"#141414",borderRadius:12,padding:"12px 14px"}}>
                    <div style={{color:"#383838",fontSize:10,letterSpacing:2,marginBottom:4}}>BODY FAT %</div>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"#F0F0F0",lineHeight:1}}>
                      {latest?.bodyFatPct?`${latest.bodyFatPct}%`:bio.bodyFatPct?`${bio.bodyFatPct}%`:"—"}
                    </div>
                    {latest?.bodyFatPct&&latest?.weightKg&&(
                      <div style={{color:"#333",fontSize:10,marginTop:3}}>
                        Lean: {parseFloat((parseFloat(latest.weightKg)*(1-parseFloat(latest.bodyFatPct)/100)).toFixed(1))}kg
                      </div>
                    )}
                  </div>
                </div>

                {/* Body Goals Progress */}
                {(()=>{
                  const wGoal = parseFloat(user.bodyGoals?.weightKg);
                  const bfGoal = parseFloat(user.bodyGoals?.bodyFatPct);
                  const curW = parseFloat(latest?.weightKg||bio.weightKg||0);
                  const curBf = parseFloat(latest?.bodyFatPct||bio.bodyFatPct||0);
                  const startW = parseFloat(user.bodyGoals?.startWeightKg||bio.weightKg||0);
                  const startBf = parseFloat(user.bodyGoals?.startBfPct||bio.bodyFatPct||0);
                  if(!wGoal&&!bfGoal) return (
                    <button onClick={()=>setShowBodyGoalModal(true)}
                      style={{background:"none",border:"1px dashed #252525",borderRadius:10,
                        color:"#333",padding:"10px",cursor:"pointer",fontSize:11,
                        fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2,width:"100%",
                        marginBottom:10}}>+ SET WEIGHT & BODY FAT GOALS</button>
                  );

                  const renderGoalBar = (label, cur, goal, start, unit, lowerIsBetter) => {
                    if(!goal||!cur) return null;
                    const totalDist = Math.abs(start - goal) || 1;
                    const progress = Math.abs(cur - start);
                    const pct = Math.min(100, Math.round(progress / totalDist * 100));
                    const achieved = lowerIsBetter ? cur <= goal : cur >= goal;
                    const remaining = Math.abs(goal - cur);
                    const onTrack = lowerIsBetter ? cur < start : cur > start;
                    const barColor = achieved ? "#A8FF3E" : onTrack ? C : "#FF6060";
                    const dispCur = unit==="%"?cur.toFixed(1)+"%":(useKgDisp?cur.toFixed(1)+"kg":parseFloat((cur*2.20462).toFixed(1))+" lbs");
                    const dispGoal = unit==="%"?goal.toFixed(1)+"%":(useKgDisp?goal.toFixed(1)+"kg":parseFloat((goal*2.20462).toFixed(1))+" lbs");
                    const dispRem = unit==="%"?remaining.toFixed(1)+"%":(useKgDisp?remaining.toFixed(1)+"kg":parseFloat((remaining*2.20462).toFixed(1))+" lbs");
                    return (
                      <div key={label} style={{background:"#141414",borderRadius:12,padding:"12px 14px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
                          <div style={{color:"#444",fontSize:10,letterSpacing:2}}>{label}</div>
                          {achieved
                            ? <div style={{color:"#A8FF3E",fontSize:10,letterSpacing:1,fontWeight:700}}>✓ ACHIEVED</div>
                            : <div style={{color:onTrack?C:"#FF6060",fontSize:10}}>{dispRem} to go</div>}
                        </div>
                        <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:8}}>
                          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:"#F0F0F0",lineHeight:1}}>{dispCur}</div>
                          <div style={{color:"#333",fontSize:12}}>→</div>
                          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:barColor,lineHeight:1}}>{dispGoal}</div>
                        </div>
                        <div style={{background:"#0d0d0d",borderRadius:6,height:8,overflow:"hidden",marginBottom:4}}>
                          <div style={{width:`${pct}%`,height:"100%",borderRadius:6,
                            background:achieved?"#A8FF3E":`linear-gradient(90deg,${barColor}66,${barColor})`,
                            transition:"width 0.5s ease",boxShadow:achieved?`0 0 8px #A8FF3E88`:`0 0 6px ${barColor}44`}}/>
                        </div>
                        <div style={{color:"#2a2a2a",fontSize:10,textAlign:"right"}}>{pct}% of the way there</div>
                      </div>
                    );
                  };

                  return (
                    <div style={{marginBottom:10}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                        <div style={{color:"#444",fontSize:10,letterSpacing:3,fontFamily:"'Barlow Condensed',sans-serif"}}>BODY GOALS</div>
                        <button onClick={()=>setShowBodyGoalModal(true)}
                          style={{background:"none",border:"none",color:"#444",fontSize:11,cursor:"pointer",
                            fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>EDIT ✎</button>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {renderGoalBar("WEIGHT GOAL", curW, wGoal, startW, "wt", wGoal<startW)}
                        {renderGoalBar("BODY FAT GOAL", curBf, bfGoal, startBf, "%", true)}
                      </div>
                    </div>
                  );
                })()}

                {/* BMR / TDEE */}
                {(bmr||tdee||totalCals>0)&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:bioHist.length>1?14:0}}>
                  {bmr&&<div style={{background:"#141414",borderRadius:12,padding:"10px 12px",textAlign:"center"}}>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:`${C}77`,lineHeight:1}}>{Math.round(bmr)}</div>
                    <div style={{color:"#383838",fontSize:9,letterSpacing:2,marginTop:3}}>BMR {bio.bodyFatPct?"(K-M)":"(M-SJ)"}</div>
                  </div>}
                  {tdee&&<div style={{background:"#141414",borderRadius:12,padding:"10px 12px",textAlign:"center"}}>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:C,lineHeight:1}}>{tdee}</div>
                    <div style={{color:"#444",fontSize:9,letterSpacing:2,marginTop:3}}>TDEE/DAY</div>
                  </div>}
                  {totalCals>0&&<div style={{background:"#141414",borderRadius:12,padding:"10px 12px",textAlign:"center"}}>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:"#FF8C42",lineHeight:1}}>{totalCals>=1000?(totalCals/1000).toFixed(1)+"k":totalCals}</div>
                    <div style={{color:"#444",fontSize:9,letterSpacing:2,marginTop:3}}>TOTAL KCAL</div>
                  </div>}
                </div>}

                {/* Body fat + weight history charts */}
                {bioHist.length>1&&(()=>{
                  const last12=bioHist.slice(0,12).reverse();
                  const weights=last12.map(e=>parseFloat(e.weightKg)||0);
                  const bfPcts=last12.map(e=>parseFloat(e.bodyFatPct)||0);
                  const hasBf=bfPcts.some(v=>v>0);
                  const firstDate=new Date(last12[0].date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
                  const lastDate=new Date(last12[last12.length-1].date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});

                  // Weight stats
                  const validW=weights.filter(Boolean);
                  const minW=validW.length?Math.min(...validW)*0.97:0, maxW=validW.length?Math.max(...validW)*1.03:1;
                  const wRange=maxW-minW||1;
                  const firstW=validW[0]||0, lastW=validW[validW.length-1]||0;
                  const deltaW=lastW-firstW;

                  // BF stats
                  const validBf=bfPcts.filter(Boolean);
                  const minBf=validBf.length?Math.min(...validBf)*0.95:0, maxBf=validBf.length?Math.max(...validBf)*1.05:1;
                  const bfRange=maxBf-minBf||1;
                  const firstBf=validBf[0]||0, lastBf=validBf[validBf.length-1]||0;
                  const deltaBf=lastBf-firstBf;

                  const ptX=(i,total)=>(i/(Math.max(total-1,1)))*280+10;

                  return (
                    <div style={{display:"flex",flexDirection:"column",gap:14}}>

                      {/* ── Body Fat % Chart ── */}
                      {hasBf&&(
                        <div>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                            <div style={{color:"#333",fontSize:10,letterSpacing:2}}>BODY FAT %</div>
                            <div style={{fontSize:11,fontWeight:700,
                              color:deltaBf<0?"#A8FF3E":deltaBf>0?"#FF6060":"#555"}}>
                              {deltaBf>0?"+":""}{deltaBf.toFixed(1)}%
                              <span style={{color:"#333",fontWeight:400}}> since {firstDate}</span>
                            </div>
                          </div>
                          <svg viewBox="0 0 300 70" style={{width:"100%",height:70,overflow:"visible"}}>
                            {/* Grid lines */}
                            {[0,0.5,1].map(t=>(
                              <line key={t} x1="10" x2="290"
                                y1={10+t*50} y2={10+t*50}
                                stroke="#1a1a1a" strokeWidth="1"/>
                            ))}
                            {/* Y axis labels */}
                            {[maxBf, (maxBf+minBf)/2, minBf].map((v,i)=>(
                              <text key={i} x="5" y={14+i*25} textAnchor="end"
                                fill="#2a2a2a" fontSize="8" fontFamily="'Barlow Condensed',sans-serif">
                                {v.toFixed(1)}%
                              </text>
                            ))}
                            {/* Area fill */}
                            <path
                              d={[
                                `M ${ptX(0,bfPcts.length)} 60`,
                                ...bfPcts.map((v,i)=>v>0?`L ${ptX(i,bfPcts.length)} ${60-((v-minBf)/bfRange)*50}`:`M ${ptX(i,bfPcts.length)} 60`),
                                `L ${ptX(bfPcts.length-1,bfPcts.length)} 60 Z`
                              ].join(" ")}
                              fill="#FF8C4218" stroke="none"/>
                            {/* Line */}
                            {(()=>{
                              const segs=[];
                              let seg=[];
                              bfPcts.forEach((v,i)=>{
                                if(v>0){ seg.push(`${ptX(i,bfPcts.length)},${60-((v-minBf)/bfRange)*50}`); }
                                else if(seg.length){ segs.push(seg); seg=[]; }
                              });
                              if(seg.length) segs.push(seg);
                              return segs.map((s,si)=>(
                                <polyline key={si} points={s.join(" ")}
                                  fill="none" stroke="#FF8C42" strokeWidth="2"
                                  strokeLinecap="round" strokeLinejoin="round"/>
                              ));
                            })()}
                            {/* Dots */}
                            {bfPcts.map((v,i)=>v>0?(
                              <g key={i}>
                                <circle cx={ptX(i,bfPcts.length)} cy={60-((v-minBf)/bfRange)*50}
                                  r="4" fill="#FF8C42"/>
                                <text x={ptX(i,bfPcts.length)} y={60-((v-minBf)/bfRange)*50-7}
                                  textAnchor="middle" fill="#FF8C4299" fontSize="8"
                                  fontFamily="'Barlow Condensed',sans-serif">{v.toFixed(1)}%</text>
                              </g>
                            ):null)}
                          </svg>
                          <div style={{display:"flex",justifyContent:"space-between",color:"#2a2a2a",fontSize:10,marginTop:2}}>
                            <span>{firstDate}</span><span>{lastDate}</span>
                          </div>
                        </div>
                      )}

                      {/* ── Weight Chart ── */}
                      {validW.length>1&&(
                        <div>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                            <div style={{color:"#333",fontSize:10,letterSpacing:2}}>WEIGHT TREND ({bioHist.length} ENTRIES)</div>
                            <div style={{fontSize:11,fontWeight:700,
                              color:deltaW<0?"#A8FF3E":deltaW>0?"#FF6060":"#555"}}>
                              {deltaW>0?"+":""}{useKgDisp?deltaW.toFixed(1)+"kg":parseFloat((deltaW*2.20462).toFixed(1))+" lbs"}
                              <span style={{color:"#333",fontWeight:400}}> since {firstDate}</span>
                            </div>
                          </div>
                          <svg viewBox="0 0 300 70" style={{width:"100%",height:70,overflow:"visible"}}>
                            {[0,0.5,1].map(t=>(
                              <line key={t} x1="10" x2="290"
                                y1={10+t*50} y2={10+t*50}
                                stroke="#1a1a1a" strokeWidth="1"/>
                            ))}
                            {[maxW,(maxW+minW)/2,minW].map((v,i)=>(
                              <text key={i} x="5" y={14+i*25} textAnchor="end"
                                fill="#2a2a2a" fontSize="8" fontFamily="'Barlow Condensed',sans-serif">
                                {useKgDisp?v.toFixed(1):parseFloat((v*2.20462).toFixed(1))}
                              </text>
                            ))}
                            {/* Area fill */}
                            <path
                              d={[
                                `M ${ptX(0,weights.length)} 60`,
                                ...weights.map((w,i)=>w>0?`L ${ptX(i,weights.length)} ${60-((w-minW)/wRange)*50}`:`M ${ptX(i,weights.length)} 60`),
                                `L ${ptX(weights.length-1,weights.length)} 60 Z`
                              ].join(" ")}
                              fill={C+"18"} stroke="none"/>
                            {/* Line */}
                            <polyline
                              points={weights.map((w,i)=>w>0?`${ptX(i,weights.length)},${60-((w-minW)/wRange)*50}`:null).filter(Boolean).join(" ")}
                              fill="none" stroke={C} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                            {/* Dots + value labels */}
                            {weights.map((w,i)=>w>0?(
                              <g key={i}>
                                <circle cx={ptX(i,weights.length)} cy={60-((w-minW)/wRange)*50}
                                  r="4" fill={C}/>
                                <text x={ptX(i,weights.length)} y={60-((w-minW)/wRange)*50-7}
                                  textAnchor="middle" fill={C+"99"} fontSize="8"
                                  fontFamily="'Barlow Condensed',sans-serif">
                                  {useKgDisp?w.toFixed(1):parseFloat((w*2.20462).toFixed(1))}
                                </text>
                              </g>
                            ):null)}
                          </svg>
                          <div style={{display:"flex",justifyContent:"space-between",color:"#2a2a2a",fontSize:10,marginTop:2}}>
                            <span>{firstDate}</span><span>{lastDate}</span>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            );
          })()}

          {/* Heatmap */}
          <div style={{background:"#0d0d0d",border:"1px solid #181818",borderRadius:16,padding:"20px 22px"}}>
            <div style={{color:"#333",fontSize:10,letterSpacing:3,marginBottom:14}}>WEEKLY FREQUENCY (16 WEEKS)</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {Array.from({length:16}).map((_,i)=>{
                const d=new Date();d.setDate(d.getDate()-(15-i)*7);
                const wk=`${d.getFullYear()}-W${Math.ceil((d.getDate()-d.getDay()+6)/7).toString().padStart(2,"0")}`;
                const c=weekMap[wk]||0;
                return (
                  <div key={i} style={{width:40,height:40,borderRadius:8,display:"flex",
                    alignItems:"center",justifyContent:"center",
                    background:c===0?"#131313":c===1?`${C}2a`:c===2?`${C}55`:C,
                    border:`1px solid ${c>0?C+"2a":"#1a1a1a"}`,
                    fontFamily:"'Bebas Neue',sans-serif",fontSize:18,
                    color:c>=3?"#000":c>0?C:"#222"}}>{c||"·"}</div>
                );
              })}
            </div>
          </div>

          {/* Recent sessions */}
          <div>
            <div style={{color:"#333",fontSize:10,letterSpacing:3,marginBottom:12}}>RECENT SESSIONS</div>
            {sessions.length===0 ? (
              <div style={{color:"#222",textAlign:"center",padding:40,fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:2}}>
                NO SESSIONS YET — GET LIFTING
              </div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:9}}>
                {sessions.slice(0,10).map(([date,sess])=>{
                  const ts=Object.values(sess.exercises||{}).reduce((a,b)=>a+(b?.filter(Boolean).length||0),0);
                  const allS=Object.values(sess.exercises||{}).flat().filter(Boolean);
                  const rpeSet=allS.filter(s=>s?.rpe>0);
                  const avgRpe=rpeSet.length?(rpeSet.reduce((a,s)=>a+s.rpe,0)/rpeSet.length).toFixed(1):null;
                  const vol=Object.values(sess.namedLog||{}).flat().filter(Boolean).reduce((a,s)=>a+(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0),0);
                  return (
                    <div key={date} style={{background:"#0d0d0d",border:"1px solid #181818",borderRadius:13,
                      padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:17,color:"#F0F0F0"}}>{sess.day}</div>
                        <div style={{color:"#444",fontSize:12,marginTop:2}}>
                          {new Date(date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:18,alignItems:"center"}}>
                        {vol>0&&<div style={{textAlign:"right"}}>
                          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"#666"}}>{vol>=1000?(vol/1000).toFixed(1)+"k":Math.round(vol)}</div>
                          <div style={{color:"#383838",fontSize:10,letterSpacing:2}}>VOL KG</div>
                        </div>}
                        {avgRpe&&<div style={{textAlign:"right"}}>
                          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:`${C}88`}}>RPE {avgRpe}</div>
                          <div style={{color:"#383838",fontSize:10,letterSpacing:2}}>AVG</div>
                        </div>}
                        <div style={{textAlign:"right"}}>
                          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,color:C}}>{ts}</div>
                          <div style={{color:"#383838",fontSize:10,letterSpacing:2}}>SETS</div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </>}

        {/* ── EXERCISES TAB ── */}
        {tab==="exercises" && <>
          {allExerciseNames.length===0 ? (
            <div style={{color:"#222",textAlign:"center",padding:60,fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:2}}>
              COMPLETE A WORKOUT TO SEE EXERCISE HISTORY
            </div>
          ) : (
            <>
              <div style={{color:"#444",fontSize:11,letterSpacing:3}}>
                {allExerciseNames.length} EXERCISES TRACKED — TAP FOR FULL HISTORY
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {allExerciseNames.map(name=>{
                  const entries=exHistory[name];
                  const best=getBestLift(name);
                  const last=getLastLift(name);
                  const trend=getTrend(name);
                  const goal=goals[name];
                  const goalPct=goal&&best?Math.min(100,Math.round((parseFloat(best.weight)||0)/(parseFloat(goal.weight)||1)*100)):null;
                  const isOpen=selectedEx===name;
                  return (
                    <div key={name} style={{background:"#0d0d0d",border:`2px solid ${isOpen?C:"#181818"}`,borderRadius:16,overflow:"hidden",transition:"border 0.15s"}}>
                      {/* Row */}
                      <div onClick={()=>setSelectedEx(isOpen?null:name)}
                        style={{padding:"16px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:16}}>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:10}}>
                            <div style={{fontWeight:700,fontSize:18,color:"#F0F0F0"}}>{name}</div>
                            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,
                              color:trendColor(trend,C)}}>{trendIcon(trend)}</div>
                          </div>
                          <div style={{color:"#444",fontSize:12,marginTop:3}}>
                            {entries.length} session{entries.length!==1?"s":""} logged
                            {best&&<span> · Best: <span style={{color:C,fontWeight:700}}>{wtDisplay(best.weight,useKg)} × {best.reps}</span></span>}
                          </div>
                        </div>
                        {/* Goal progress pill */}
                        {goalPct!==null && (
                          <div style={{textAlign:"center",minWidth:64}}>
                            <div style={{background:"#141414",border:`1px solid ${C}44`,borderRadius:10,padding:"6px 10px"}}>
                              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,
                                color:goalPct>=100?"#A8FF3E":C,lineHeight:1}}>{goalPct}%</div>
                              <div style={{color:"#444",fontSize:9,letterSpacing:2}}>GOAL</div>
                            </div>
                          </div>
                        )}
                        <button onClick={e=>{e.stopPropagation();setShowGoalModal(name);}} style={{
                          background:goal?`${C}18`:"#141414",border:`1px solid ${goal?C+"55":"#2a2a2a"}`,
                          borderRadius:10,color:goal?C:"#555",padding:"8px 14px",cursor:"pointer",
                          fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:12,letterSpacing:1}}>
                          {goal?"GOAL ✓":"SET GOAL"}
                        </button>
                        <div style={{color:isOpen?C:"#333",fontSize:18,fontFamily:"'Bebas Neue',sans-serif"}}>{isOpen?"▲":"▼"}</div>
                      </div>

                      {/* Expanded history */}
                      {isOpen && (
                        <div style={{borderTop:"1px solid #161616",padding:"16px 20px",display:"flex",flexDirection:"column",gap:10}}>
                          {/* Goal bar */}
                          {goal && (
                            <div style={{background:"#141414",border:`1px solid #222`,borderRadius:12,padding:"14px 16px",marginBottom:4}}>
                              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                                <div style={{color:"#555",fontSize:11,letterSpacing:2}}>GOAL: {goal.weight} × {goal.reps} reps</div>
                                <div style={{color:goalPct>=100?"#A8FF3E":C,fontFamily:"'Bebas Neue',sans-serif",fontSize:18}}>{goalPct}%</div>
                              </div>
                              <div style={{background:"#1e1e1e",borderRadius:6,height:8,overflow:"hidden"}}>
                                <div style={{width:`${goalPct}%`,height:"100%",
                                  background:goalPct>=100?"#A8FF3E":C,
                                  borderRadius:6,transition:"width 0.5s ease"}}/>
                              </div>
                            </div>
                          )}
                          {/* Per-session rows */}
                          <div style={{color:"#333",fontSize:10,letterSpacing:3,marginBottom:4}}>SESSION HISTORY</div>
                          {[...entries].reverse().slice(0,12).map((e,i)=>(
                            <div key={i} style={{background:"#141414",border:"1px solid #1e1e1e",
                              borderRadius:11,padding:"12px 16px"}}>
                              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                                <div style={{color:"#777",fontSize:12}}>
                                  {new Date(e.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}
                                </div>
                                <div style={{display:"flex",gap:14}}>
                                  {e.vol>0&&<div style={{textAlign:"right"}}>
                                    <span style={{color:"#555",fontSize:11}}>VOL </span>
                                    <span style={{color:"#888",fontWeight:700,fontSize:12}}>{Math.round(e.vol)}</span>
                                  </div>}
                                  <div>
                                    <span style={{color:"#555",fontSize:11}}>BEST </span>
                                    <span style={{color:C,fontWeight:700,fontSize:13}}>{wtDisplay(e.best?.weight,useKg)} × {e.best?.reps}</span>
                                  </div>
                                </div>
                              </div>
                              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                                {e.sets.map((s,j)=>(
                                  <div key={j} style={{background:"#1a1a1a",border:"1px solid #252525",
                                    borderRadius:8,padding:"5px 10px",fontSize:12}}>
                                    <span style={{color:C,fontWeight:700}}>{wtDisplay(s.weight,useKg)}</span>
                                    <span style={{color:"#444"}}> × </span>
                                    <span style={{color:"#ddd"}}>{s.reps}</span>
                                    {s.rpe>0&&<span style={{color:"#555",fontSize:10}}> R{s.rpe}</span>}
                                  </div>
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </>}


        {/* ── CHARTS TAB ── */}
        {tab==="charts" && <ChartTab
          exHistory={exHistory}
          allExerciseNames={allExerciseNames}
          sessions={sessions}
          history={history}
          color={C}
          bio={user.biometrics}
          useKg={useKg}
          chartEx={chartEx} setChartEx={setChartEx}
          volPeriod={volPeriod} setVolPeriod={setVolPeriod}
          chartMetric={chartMetric} setChartMetric={setChartMetric}
        />}

        {/* ── GOALS TAB ── */}
        {showBodyGoalModal&&onUpdateUser&&(
        <BodyGoalModal user={user} onClose={()=>setShowBodyGoalModal(false)}
          onSave={goals=>{
            onUpdateUser({...user,bodyGoals:goals||null});
            setShowBodyGoalModal(false);
          }}/>
      )}

      {showBioModal&&onUpdateUser&&(
        <BiometricLogModal user={user} onClose={()=>setShowBioModal(false)}
          onSave={entry=>{
            const hist=[...(user.biometricHistory||[]).filter(e=>e.date!==entry.date),entry]
              .sort((a,b)=>a.date.localeCompare(b.date));
            // Also update current biometrics with latest weight/bf
            const updBio={...user.biometrics};
            if(entry.weightKg) updBio.weightKg=String(entry.weightKg);
            if(entry.bodyFatPct) updBio.bodyFatPct=String(entry.bodyFatPct);
            onUpdateUser({...user,biometrics:updBio,biometricHistory:hist});
            setShowBioModal(false);
          }}/>
      )}
      {showBioModal&&!onUpdateUser&&(
        <div style={{position:"fixed",inset:0,zIndex:9000,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#141414",borderRadius:20,padding:28,textAlign:"center",color:"#666"}}>
            Open from Manage → View Progress to log stats
            <div><button onClick={()=>setShowBioModal(false)} style={{marginTop:16,background:"none",border:"1px solid #333",borderRadius:8,color:"#555",padding:"8px 16px",cursor:"pointer"}}>CLOSE</button></div>
          </div>
        </div>
      )}

      {tab==="goals" && <>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{color:"#444",fontSize:11,letterSpacing:3}}>{Object.keys(goals).length} GOALS SET</div>
            <Btn label="+ NEW GOAL" size="sm" bg={`${C}18`} color={C} border={`${C}44`}
              onClick={()=>setShowGoalModal("new")} />
          </div>

          {Object.keys(goals).length===0 ? (
            <div style={{color:"#1e1e1e",textAlign:"center",padding:60,fontFamily:"'Bebas Neue',sans-serif",
              fontSize:22,letterSpacing:2,lineHeight:1.6}}>
              NO GOALS SET YET<br/>
              <span style={{fontSize:14,color:"#2a2a2a"}}>TAP + NEW GOAL TO GET STARTED</span>
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              {Object.entries(goals).map(([name,goal])=>{
                const best=getBestLift(name);
                const bestW=parseFloat(best?.weight)||0;
                const goalW=parseFloat(goal.weight)||1;
                const goalR=parseInt(goal.reps)||1;
                const bestR=parseInt(best?.reps)||0;
                // Progress: weight progress (primary) + reps bonus
                const wPct=Math.min(100,Math.round(bestW/goalW*100));
                const achieved=bestW>=goalW&&bestR>=goalR;
                return (
                  <div key={name} style={{background:"#0d0d0d",
                    border:`2px solid ${achieved?"#A8FF3E33":C+"22"}`,borderRadius:18,
                    padding:"20px 22px",position:"relative",overflow:"hidden"}}>
                    {achieved&&<div style={{position:"absolute",top:0,right:0,background:"#A8FF3E",
                      color:"#000",padding:"4px 16px",fontSize:12,fontFamily:"'Barlow Condensed',sans-serif",
                      fontWeight:700,letterSpacing:2,borderBottomLeftRadius:12}}>ACHIEVED ✓</div>}
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:20,color:"#F0F0F0",marginBottom:4}}>{name}</div>
                        <div style={{color:"#555",fontSize:13}}>
                          Target: <span style={{color:achieved?"#A8FF3E":C,fontWeight:700}}>{wtDisplay(goal.weight,useKg)} × {goal.reps} reps</span>
                        </div>
                        {best&&<div style={{color:"#555",fontSize:12,marginTop:2}}>
                          Best so far: <span style={{color:"#888",fontWeight:700}}>{wtDisplay(best.weight,useKg)} × {best.reps}</span>
                        </div>}
                      </div>
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>setShowGoalModal(name)} style={{
                          background:"#141414",border:"1px solid #252525",borderRadius:9,
                          color:"#666",padding:"8px 14px",cursor:"pointer",
                          fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:1}}>EDIT</button>
                        <button onClick={()=>{const g={...goals};delete g[name];onUpdateGoals(g);}} style={{
                          background:"#141414",border:"1px solid #252525",borderRadius:9,
                          color:"#555",padding:"8px 12px",cursor:"pointer",fontSize:14}}>🗑</button>
                      </div>
                    </div>
                    {/* Progress bar */}
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                        <div style={{color:"#383838",fontSize:11,letterSpacing:2}}>WEIGHT PROGRESS</div>
                        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,
                          color:achieved?"#A8FF3E":C}}>{wPct}%</div>
                      </div>
                      <div style={{background:"#141414",borderRadius:8,height:10,overflow:"hidden"}}>
                        <div style={{width:`${wPct}%`,height:"100%",
                          background:achieved?"#A8FF3E":`linear-gradient(90deg,${C}88,${C})`,
                          borderRadius:8,transition:"width 0.6s ease",
                          boxShadow:achieved?`0 0 12px #A8FF3E88`:`0 0 8px ${C}66`}}/>
                      </div>
                      {!achieved&&bestW>0&&<div style={{color:"#333",fontSize:11,marginTop:6}}>
                        {goalW-bestW>0?`${(goalW-bestW).toFixed(1)} away from target weight`:"Weight reached — work on reps!"}
                      </div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </>}
      </div>

      {/* Goal editor modal */}
      {showGoalModal && (
        <GoalModal
          exerciseName={showGoalModal==="new"?"":showGoalModal}
          existingGoal={showGoalModal!=="new"?goals[showGoalModal]:null}
          allExercises={allExerciseNames}
          color={C}
          useKg={useKg}
          onSave={(name,g)=>{ onUpdateGoals({...goals,[name]:g}); setShowGoalModal(null); }}
          onClose={()=>setShowGoalModal(null)}
        />
      )}
    </div>
  );
}

function GoalModal({ exerciseName, existingGoal, allExercises, color, useKg=true, onSave, onClose }) {
  const [name, setName] = useState(exerciseName||"");
  // Display in user's preferred unit; store in kg
  const [weight, setWeight] = useState(existingGoal?.weight ? toDisplayVal(existingGoal.weight, useKg) : "");
  const [reps, setReps] = useState(existingGoal?.reps||"");
  const [customName, setCustomName] = useState(!allExercises.includes(exerciseName));

  const canSave = name.trim() && parseFloat(weight)>0 && parseInt(reps)>0;

  return (
    <Modal title={existingGoal?"EDIT GOAL":"NEW GOAL"} onClose={onClose} width={460}>
      <div style={{display:"flex",flexDirection:"column",gap:18}}>
        {/* Exercise name picker */}
        <div>
          <div style={{color:"#555",fontSize:11,letterSpacing:3,marginBottom:10,fontFamily:"'Barlow Condensed',sans-serif"}}>EXERCISE</div>
          {allExercises.length>0&&!customName ? (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <select value={name} onChange={e=>setName(e.target.value)} style={{
                width:"100%",background:"#111",border:`2px solid ${name?color:"#2a2a2a"}`,borderRadius:12,
                color:"#F0F0F0",fontSize:16,padding:"13px 16px",fontFamily:"'Barlow',sans-serif",outline:"none"}}>
                <option value="">Select exercise...</option>
                {allExercises.map(n=><option key={n} value={n}>{n}</option>)}
              </select>
              <button onClick={()=>{setCustomName(true);setName("");}} style={{
                background:"none",border:"none",color:"#555",cursor:"pointer",
                fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:2,textAlign:"left"}}>
                + TYPE CUSTOM EXERCISE NAME
              </button>
            </div>
          ) : (
            <div>
              <TouchTextInput value={name} onChange={setName} placeholder="e.g. Bench Press" color={color}/>
              {allExercises.length>0&&<button onClick={()=>{setCustomName(false);setName("");}} style={{
                background:"none",border:"none",color:"#555",cursor:"pointer",marginTop:6,
                fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,letterSpacing:2}}>
                ← PICK FROM LOGGED EXERCISES
              </button>}
            </div>
          )}
        </div>

        <div style={{background:"#0a0a0a",border:"1px solid #1e1e1e",borderRadius:14,padding:"16px 18px"}}>
          <div style={{color:"#444",fontSize:11,letterSpacing:3,marginBottom:14,fontFamily:"'Barlow Condensed',sans-serif"}}>TARGET</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                <div style={{color:"#555",fontSize:10,letterSpacing:3,fontFamily:"'Barlow Condensed',sans-serif"}}>TARGET WEIGHT</div>
                <div style={{color:color,fontSize:12,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",
                  background:`${color}18`,border:`1px solid ${color}44`,borderRadius:6,padding:"2px 8px",letterSpacing:1}}>
                  {useKg?"KG":"LBS"}
                </div>
              </div>
              <input type="number" value={weight} onChange={e=>setWeight(e.target.value)}
                placeholder={useKg?"e.g. 100":"e.g. 225"}
                style={{width:"100%",background:"#111",border:`2px solid ${color}44`,borderRadius:12,
                  color:"#F0F0F0",fontSize:22,padding:"14px 16px",fontFamily:"'Barlow',sans-serif",
                  outline:"none",boxSizing:"border-box",fontWeight:700}}/>
              {weight && <div style={{color:"#444",fontSize:11,marginTop:5}}>
                = {useKg ? `${(parseFloat(weight)*2.20462).toFixed(1)} lbs` : `${(parseFloat(weight)/2.20462).toFixed(1)} kg`}
              </div>}
            </div>
            <div>
              <div style={{color:"#555",fontSize:10,letterSpacing:3,marginBottom:8,fontFamily:"'Barlow Condensed',sans-serif"}}>TARGET REPS</div>
              <RepsSpinner value={reps} onChange={setReps} color={color} placeholder="5"/>
            </div>
          </div>
          {name&&weight&&reps&&<div style={{marginTop:14,padding:"10px 14px",background:`${color}0e`,
            border:`1px solid ${color}33`,borderRadius:10,color:color,
            fontFamily:"'Bebas Neue',sans-serif",fontSize:20,letterSpacing:2,textAlign:"center"}}>
            GOAL: {name.toUpperCase()} — {weight} {useKg?'KG':'LBS'} × {reps} REPS
          </div>}
        </div>

        <div style={{display:"flex",gap:12}}>
          <Btn full label="CANCEL" bg="transparent" color="#555" border="#222" onClick={onClose}/>
          <Btn full label="SAVE GOAL" bg={color} color="#000" disabled={!canSave}
            onClick={()=>onSave(name.trim(),{weight: toStoredKg(weight, useKg), reps})}/>  
        </div>
      </div>
    </Modal>
  );
}

// ─── Backup Reminder Modal ────────────────────────────────────────────────────
function BackupReminderModal({ users, programs, history, goals, onDismiss }) {
  const totalSessions = Object.values(history).reduce((a,h)=>a+Object.keys(h||{}).length,0);
  return (
    <div style={{position:"fixed",inset:0,zIndex:9800,background:"rgba(0,0,0,0.92)",
      backdropFilter:"blur(14px)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"#141414",border:"2px solid #A8FF3E33",borderRadius:24,
        maxWidth:400,width:"100%",padding:"32px 28px",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>💾</div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,color:"#F0F0F0",
          letterSpacing:3,lineHeight:1.1,marginBottom:10}}>
          TIME TO BACK UP
        </div>
        <div style={{color:"#555",fontSize:14,lineHeight:1.6,marginBottom:6}}>
          You have <strong style={{color:"#F0F0F0"}}>{totalSessions} sessions</strong> logged.
        </div>
        <div style={{color:"#444",fontSize:13,lineHeight:1.6,marginBottom:24}}>
          If your browser data is cleared, this data will be lost. Export a backup now to keep it safe.
        </div>
        <div style={{background:"#0d0d0d",border:"1px solid #1e1e1e",borderRadius:12,
          padding:"12px 16px",marginBottom:24,color:"#383838",fontSize:11,lineHeight:1.6,textAlign:"left"}}>
          📱 Save the file to Google Drive, email it to yourself, or copy it somewhere safe. You can restore it anytime from the Manage screen.
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <button onClick={()=>{
            try{localStorage.setItem("gft-sessions-since-backup","0");}catch{}
            const csv=buildBackupCsv(users,programs,history,goals);
            tryDownloadCsv(csv,"gym-tracker-backup.csv");
            // Show export modal logic handled by parent — just show csv
            onDismiss(csv);
          }} style={{width:"100%",height:56,borderRadius:14,background:"#A8FF3E",border:"none",
            color:"#000",fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:3,
            cursor:"pointer"}}>
            EXPORT BACKUP NOW
          </button>
          <button onClick={()=>{
            try{localStorage.setItem("gft-sessions-since-backup","0");}catch{}
            onDismiss(null);
          }} style={{background:"none",border:"none",color:"#444",fontSize:13,cursor:"pointer",
            fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:2,padding:"8px"}}>
            REMIND ME LATER
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [users,setUsers]=useState(DEFAULT_USERS);
  const [programs,setPrograms]=useState(DEFAULT_PROGRAMS);
  const [history,setHistory]=useState({});
  const [goals,setGoals]=useState({});
  const [screen,setScreen]=useState("home");
  const [activeIds,setActiveIds]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [showBackupReminder,setShowBackupReminder]=useState(false);
  const [exportCsvForBackup,setExportCsvForBackup]=useState(null);
  const BACKUP_INTERVAL = 5; // remind every N sessions

  useEffect(()=>{
    Promise.all([sGet("gft-users"),sGet("gft-programs"),sGet("gft-history"),sGet("gft-goals")]).then(([u,p,h,g])=>{
      if(u)setUsers(u); if(p)setPrograms(p); if(h)setHistory(h); if(g)setGoals(g);
      setLoaded(true);
    });
  },[]);

  const saveUsers=async u=>{setUsers(u);await sSet("gft-users",u);};
  const savePrograms=async p=>{setPrograms(p);await sSet("gft-programs",p);};
  const saveHistory=async h=>{setHistory(h);await sSet("gft-history",h);};
  const saveGoals=async g=>{setGoals(g);await sSet("gft-goals",g);};

  const updateUser=u=>saveUsers(users.map(x=>x.id===u.id?u:x));
  const addUser=u=>{
    const nu=[...users,u];
    saveUsers(nu);
    savePrograms({...programs,[u.id]:{id:mkId(),name:"New Program",weeks:8,days:[]}});
  };
  const deleteUser=uid=>{
    saveUsers(users.filter(u=>u.id!==uid));
    const np={...programs}; delete np[uid];
    savePrograms(np);
    const nh={...history}; delete nh[uid];
    saveHistory(nh);
    const ng={...goals}; delete ng[uid];
    saveGoals(ng);
  };
  const updateProgram=(uid,p)=>savePrograms({...programs,[uid]:p});
  const saveAsProgram=(uid,dayData)=>{
    const prog=programs[uid]||{id:mkId(),name:"My Program",weeks:8,days:[]};
    const newDay={id:mkId(),label:dayData.label||"Freestyle",days:[],scheduleType:"frequency",timesPerWeek:3,
      defaultMode:dayData.defaultMode||"traditional",
      exercises:(dayData.exercises||[]).map(ex=>({id:mkId(),name:ex.name,sets:ex.sets||3,reps:String(ex.reps||10),rest:ex.rest||60,setup:"",groupId:null,progression:{type:"fixed",value:0}}))};
    const updated={...prog,days:[...prog.days,newDay]};
    savePrograms({...programs,[uid]:updated});
  };
  const updateGoals=(uid,g)=>saveGoals({...goals,[uid]:g});
  const saveWorkout=async(uid,dk,sess)=>{
    const nh={...history,[uid]:{...(history[uid]||{}),[dk]:sess}};
    await saveHistory(nh);
    // Backup reminder counter
    try {
      const raw = localStorage.getItem("gft-sessions-since-backup");
      const count = parseInt(raw||"0") + 1;
      localStorage.setItem("gft-sessions-since-backup", String(count));
      if(count >= BACKUP_INTERVAL) setShowBackupReminder(true);
    } catch {}
  };

  if(!loaded) return (
    <div style={{minHeight:"100vh",background:"#080808",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:"#1e1e1e",letterSpacing:6}}>LOADING...</div>
    </div>
  );

  // Backup modal overlay — rendered on top of whatever screen is active
  const BackupOverlay = () => (
    <>
      {showBackupReminder&&(
        <BackupReminderModal users={users} programs={programs} history={history} goals={goals}
          onDismiss={csv=>{
            setShowBackupReminder(false);
            if(csv) setExportCsvForBackup(csv);
          }}/>
      )}
      {exportCsvForBackup&&(
        <div style={{position:"fixed",inset:0,zIndex:9900,background:"rgba(0,0,0,0.92)",
          backdropFilter:"blur(12px)",display:"flex",flexDirection:"column",
          alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#141414",border:"1px solid #2a2a2a",borderRadius:24,
            width:"100%",maxWidth:640,maxHeight:"90vh",display:"flex",flexDirection:"column"}}>
            <div style={{padding:"20px 24px",borderBottom:"1px solid #1e1e1e",
              display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,letterSpacing:3,color:"#F0F0F0"}}>BACKUP CSV</div>
                <div style={{color:"#444",fontSize:11,marginTop:2}}>gym-tracker-backup.csv</div>
              </div>
              <button onClick={()=>setExportCsvForBackup(null)}
                style={{background:"none",border:"1px solid #2a2a2a",borderRadius:10,color:"#555",
                  padding:"8px 16px",cursor:"pointer",fontSize:16}}>✕</button>
            </div>
            <div style={{padding:"16px 20px",flex:1,minHeight:0,display:"flex",flexDirection:"column",gap:12}}>
              <div style={{color:"#555",fontSize:12,lineHeight:1.6}}>
                Select all and copy, then save as <strong style={{color:"#888"}}>.csv</strong>
              </div>
              <textarea readOnly value={exportCsvForBackup} onFocus={e=>e.target.select()}
                style={{flex:1,minHeight:200,background:"#080808",border:"1px solid #252525",
                  borderRadius:12,color:"#7aaa7a",fontSize:11,fontFamily:"monospace",
                  padding:"12px 14px",resize:"none",outline:"none",lineHeight:1.6}}/>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>{navigator.clipboard?.writeText(exportCsvForBackup).catch(()=>{});}}
                  style={{flex:1,height:52,borderRadius:12,background:"#1e2a1e",border:"1px solid #2a3a2a",
                    color:"#7ddd7d",fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,cursor:"pointer"}}>
                  📋 COPY TO CLIPBOARD
                </button>
                <button onClick={()=>tryDownloadCsv(exportCsvForBackup,"gym-tracker-backup.csv")}
                  style={{flex:1,height:52,borderRadius:12,background:"#1a1e2a",border:"1px solid #2a2a3a",
                    color:"#7d9ddd",fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:2,cursor:"pointer"}}>
                  💾 TRY DOWNLOAD
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </>
  );

  if(screen==="session") return (
    <><SessionScreen activeIds={activeIds} users={users} programs={programs}
      history={history} onSaveWorkout={saveWorkout} onSaveAsProgram={saveAsProgram} onBack={()=>setScreen("home")}/><BackupOverlay/></>
  );
  if(screen==="manage") return (
    <><ManageScreen users={users} programs={programs} history={history} goals={goals}
      onUpdateUser={updateUser} onAddUser={addUser} onDeleteUser={deleteUser} onUpdateProgram={updateProgram} onUpdateGoals={updateGoals}
      onUpdateHistory={(uid,h)=>saveHistory({...history,[uid]:h})}
      onExportBackup={()=>{ try{localStorage.setItem("gft-sessions-since-backup","0");}catch{} return buildBackupCsv(users,programs,history,goals); }}
      onExportHistory={()=>buildHistoryCsv(users,history)}
      onImport={d=>{if(d["gft-users"])saveUsers(d["gft-users"]);if(d["gft-programs"])savePrograms(d["gft-programs"]);if(d["gft-history"])saveHistory(d["gft-history"]);if(d["gft-goals"])saveGoals(d["gft-goals"]);}}
      onBack={()=>setScreen("home")}/><BackupOverlay/></>
  );
  return (
    <><HomeScreen users={users} programs={programs} history={history}
      onStartSession={ids=>{setActiveIds(ids);setScreen("session");}}
      onManage={()=>setScreen("manage")}/><BackupOverlay/></>
  );
}

// Mount the app
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        navigator.serviceWorker.register('sw.js').catch(()=>{});
      });
    }
  </script>
</body>
</html>
